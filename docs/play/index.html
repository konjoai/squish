<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#4c1d95"/>
<title>Squish World</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#1a0533;touch-action:none;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;overscroll-behavior:none}
canvas{display:block;width:100vw;height:100vh;cursor:pointer;touch-action:none}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
'use strict';
const C=document.getElementById('c');
const ctx=C.getContext('2d');
let W=0,H=0;
function resize(){W=C.width=window.innerWidth;H=C.height=window.innerHeight;buildTiles();if(G&&G.onResize)G.onResize();}
window.addEventListener('resize',resize);
if(!CanvasRenderingContext2D.prototype.roundRect){CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){const rv=typeof r==='number'?[r,r,r,r]:Array.isArray(r)?r:[0,0,0,0];while(rv.length<4)rv.push(rv[rv.length-1]);this.moveTo(x+rv[0],y);this.lineTo(x+w-rv[1],y);this.quadraticCurveTo(x+w,y,x+w,y+rv[1]);this.lineTo(x+w,y+h-rv[2]);this.quadraticCurveTo(x+w,y+h,x+w-rv[2],y+h);this.lineTo(x+rv[3],y+h);this.quadraticCurveTo(x,y+h,x,y+h-rv[3]);this.lineTo(x,y+rv[0]);this.quadraticCurveTo(x,y,x+rv[0],y);this.closePath();return this;};}

// AUDIO
let _ac=null;
function unlockAudio(){if(_ac)return;_ac=new(window.AudioContext||window.webkitAudioContext)();}
function playPop(){if(!_ac)return;const o=_ac.createOscillator(),g=_ac.createGain();o.connect(g);g.connect(_ac.destination);o.frequency.setValueAtTime(600,_ac.currentTime);o.frequency.exponentialRampToValueAtTime(100,_ac.currentTime+.15);g.gain.setValueAtTime(.4,_ac.currentTime);g.gain.exponentialRampToValueAtTime(.001,_ac.currentTime+.15);o.start();o.stop(_ac.currentTime+.16);}
function playChime(freq){if(!_ac)return;freq=freq||440;const o=_ac.createOscillator(),g=_ac.createGain();o.type='sine';o.connect(g);g.connect(_ac.destination);o.frequency.value=freq;g.gain.setValueAtTime(.3,_ac.currentTime);g.gain.exponentialRampToValueAtTime(.001,_ac.currentTime+.4);o.start();o.stop(_ac.currentTime+.41);}
function playBoing(){if(!_ac)return;const o=_ac.createOscillator(),g=_ac.createGain();o.type='sine';o.connect(g);g.connect(_ac.destination);o.frequency.setValueAtTime(200,_ac.currentTime);o.frequency.exponentialRampToValueAtTime(400,_ac.currentTime+.1);o.frequency.exponentialRampToValueAtTime(300,_ac.currentTime+.2);g.gain.setValueAtTime(.35,_ac.currentTime);g.gain.exponentialRampToValueAtTime(.001,_ac.currentTime+.3);o.start();o.stop(_ac.currentTime+.31);}
function playSuccess(){[261,329,392,523].forEach((f,i)=>setTimeout(()=>playChime(f),i*80));}
const PENTA=[261,294,329,392,440,523,587,659];
function playNote(i){playChime(PENTA[i%PENTA.length]);}

// PARTICLES
const PAR=[];
const RAINBOW=['#f43f5e','#f59e0b','#22c55e','#3b82f6','#a855f7','#14b8a6','#f97316','#ec4899'];
function burst(x,y,n,cols){n=n||8;cols=cols||RAINBOW;for(let i=0;i<n;i++){const a=Math.PI*2*i/n+Math.random()*.4,s=3+Math.random()*5;PAR.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,r:4+Math.random()*5,color:cols[i%cols.length],alpha:1,grav:.15});}}
function confettiAt(x,y){for(let i=0;i<32;i++)PAR.push({x:x+(Math.random()-.5)*120,y,vx:(Math.random()-.5)*9,vy:-(4+Math.random()*7),r:5+Math.random()*5,color:RAINBOW[i%RAINBOW.length],alpha:1,grav:.28});}
function tickPar(dt){for(let i=PAR.length-1;i>=0;i--){const p=PAR[i];p.x+=p.vx;p.y+=p.vy;p.vy+=p.grav;p.vx*=.97;p.alpha-=dt*1.8;if(p.alpha<=0)PAR.splice(i,1);}}
function drawPar(){for(const p of PAR){ctx.save();ctx.globalAlpha=Math.max(0,p.alpha);ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();ctx.restore();}}

// STATE
let state='chooser',G=null,T=0;

// CHOOSER
const GDEFS=[
  {name:'Bubbles',emoji:'🫧',color:'#0ea5e9',mk:mkBubbles},
  {name:'Animals',emoji:'🦆',color:'#f59e0b',mk:mkAnimals},
  {name:'Paint',emoji:'🎨',color:'#ec4899',mk:mkPaint},
  {name:'Stars',emoji:'⭐',color:'#8b5cf6',mk:mkStars},
  {name:'Rain',emoji:'🌈',color:'#14b8a6',mk:mkRain},
  {name:'Squish',emoji:'💜',color:'#7c3aed',mk:mkSquish},
  {name:'Fireflies',emoji:'✨',color:'#1d4ed8',mk:mkFirefly},
  {name:'Weather',emoji:'🌦',color:'#10b981',mk:mkWeather},
];
let tiles=[],tilePress=-1,tilePressT=0;
function buildTiles(){tiles=[];const cols=W>H?4:2,rows=GDEFS.length/cols,pad=14,top=Math.min(72,H*.09),maxTW=W>H?210:230;const tw=Math.min(maxTW,Math.floor((W-pad*(cols+1))/cols)),th=Math.min(tw,Math.floor((H-top-pad*(rows+1))/rows));const gW=cols*tw+(cols-1)*pad,gH=rows*th+(rows-1)*pad,ox=(W-gW)/2,oy=top+(H-top-gH)/2;GDEFS.forEach((d,i)=>{const col=i%cols,row=Math.floor(i/cols);tiles.push({x:ox+col*(tw+pad),y:oy+row*(th+pad),w:tw,h:th,...d});});}
function drawChooser(){
  const bg=ctx.createRadialGradient(W/2,H*.3,0,W/2,H*.3,Math.max(W,H));bg.addColorStop(0,'#4c1d95');bg.addColorStop(.6,'#2e1065');bg.addColorStop(1,'#1a0533');ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  for(let i=0;i<45;i++){const sx=(i*137.5)%W,sy=(i*91.3)%(H*.9),a=.2+.3*Math.sin(T*1.8+i*.7);ctx.fillStyle=`rgba(255,255,255,${a})`;ctx.beginPath();ctx.arc(sx,sy,.8+(i%3)*.5,0,Math.PI*2);ctx.fill();}
  const ly=Math.min(36,H*.046),ls=Math.min(26,H*.034);ctx.save();ctx.translate(W/2,ly);ctx.beginPath();ctx.roundRect(-ls,-ls,ls*2,ls*2,ls*.32);ctx.fillStyle='rgba(167,139,250,.4)';ctx.fill();ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(-ls*.32,-ls*.05,ls*.18,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(ls*.32,-ls*.05,ls*.18,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(0,ls*.22,ls*.28,.1,Math.PI-.1);ctx.strokeStyle='#fff';ctx.lineWidth=ls*.09;ctx.lineCap='round';ctx.stroke();ctx.restore();
  for(let i=0;i<tiles.length;i++){const t=tiles[i];let sc=1;if(tilePress===i){const e=T-tilePressT;sc=e<.08?.92:e<.2?1+.12*Math.sin((e-.08)/.12*Math.PI):1;}ctx.save();ctx.translate(t.x+t.w/2,t.y+t.h/2);ctx.scale(sc,sc);if(sc>1.02){ctx.shadowColor=t.color;ctx.shadowBlur=28;}ctx.beginPath();ctx.roundRect(-t.w/2,-t.h/2,t.w,t.h,28);ctx.fillStyle=t.color;ctx.fill();const tg=ctx.createLinearGradient(0,-t.h/2,0,t.h/2);tg.addColorStop(0,'rgba(255,255,255,.22)');tg.addColorStop(1,'rgba(0,0,0,.15)');ctx.fillStyle=tg;ctx.fill();ctx.shadowBlur=0;const es=Math.min(t.h*.42,t.w*.42,72);ctx.font=es+'px system-ui';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(t.emoji,0,-t.h*.07);ctx.fillStyle='rgba(255,255,255,.92)';ctx.font=`bold ${Math.min(t.w*.15,20)}px system-ui,sans-serif`;ctx.fillText(t.name,0,t.h*.32);ctx.restore();}
}
function chooserTap(x,y){for(let i=0;i<tiles.length;i++){const t=tiles[i];if(x>=t.x&&x<=t.x+t.w&&y>=t.y&&y<=t.y+t.h){tilePress=i;tilePressT=T;playBoing();setTimeout(()=>{state='game';G=t.mk();if(G.init)G.init();},210);return;}}}

// BACK BUTTON
const BR=34;
function drawBack(){const bx=BR+16,by=H-BR-16;ctx.save();ctx.beginPath();ctx.arc(bx,by,BR,0,Math.PI*2);ctx.fillStyle='rgba(0,0,0,.45)';ctx.fill();ctx.fillStyle='rgba(255,255,255,.9)';ctx.font=`bold ${BR*1.1}px system-ui`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('◄',bx,by+1);ctx.restore();}
function isBack(x,y){return Math.hypot(x-BR-16,y-H+BR+16)<BR+14;}

// BUBBLES
function mkBubbles(){let bubbles=[],score=0,spawnT=0;function spawn(){if(bubbles.length>=12)return;const r=40+Math.random()*42;bubbles.push({x:r+Math.random()*(W-r*2),y:H+r,r,color:RAINBOW[Math.floor(Math.random()*RAINBOW.length)],vy:-(1+Math.random()*1.5)*(H/750),vx:(Math.random()-.5)*.6,wob:Math.random()*Math.PI*2,wobS:.8+Math.random()*.8,pop:false,popR:0,popA:1});}
return{init(){for(let i=0;i<7;i++)spawn();},update(dt){spawnT+=dt;if(spawnT>.7){spawn();spawnT=0;}for(let i=bubbles.length-1;i>=0;i--){const b=bubbles[i];if(b.pop){b.popR+=dt*200;b.popA-=dt*4;if(b.popA<=0){bubbles.splice(i,1);spawn();}}else{b.wob+=dt*b.wobS;b.x+=b.vx+Math.sin(b.wob)*.35;b.y+=b.vy;if(b.y<-b.r*2){bubbles.splice(i,1);spawn();}}}},
draw(t){const bg=ctx.createLinearGradient(0,0,0,H);bg.addColorStop(0,'#0c1445');bg.addColorStop(1,'#1e40af');ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);ctx.fillStyle='rgba(255,255,255,.06)';ctx.beginPath();ctx.moveTo(0,H*.86);for(let x=0;x<=W;x+=14)ctx.lineTo(x,H*.86+Math.sin(x*.018+t*2)*11);ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.closePath();ctx.fill();ctx.fillStyle='rgba(255,255,255,.9)';ctx.font=`bold ${Math.min(W,H)*.13}px system-ui`;ctx.textAlign='center';ctx.textBaseline='alphabetic';ctx.fillText(score,W/2,H*.13);for(const b of bubbles){ctx.save();if(b.pop){ctx.globalAlpha=Math.max(0,b.popA);ctx.beginPath();ctx.arc(b.x,b.y,b.popR,0,Math.PI*2);ctx.strokeStyle=b.color;ctx.lineWidth=4;ctx.stroke();}else{ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);const g=ctx.createRadialGradient(b.x-b.r*.3,b.y-b.r*.3,1,b.x,b.y,b.r);g.addColorStop(0,b.color+'55');g.addColorStop(1,b.color+'0a');ctx.fillStyle=g;ctx.fill();ctx.strokeStyle='rgba(255,255,255,.72)';ctx.lineWidth=4;ctx.stroke();ctx.beginPath();ctx.arc(b.x-b.r*.3,b.y-b.r*.28,b.r*.22,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,.55)';ctx.fill();}ctx.restore();}},
onTap(x,y){for(let i=bubbles.length-1;i>=0;i--){const b=bubbles[i];if(!b.pop&&Math.hypot(x-b.x,y-b.y)<b.r+16){b.pop=true;score++;playPop();burst(b.x,b.y,8,[b.color,'#fff',b.color]);return;}}},onResize(){for(let i=0;i<3;i++)spawn();}};}

// ANIMALS
function drawDuck(ctx,x,y,sz,col){ctx.fillStyle=col;ctx.beginPath();ctx.ellipse(x,y,sz*.5,sz*.35,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(x+sz*.35,y-sz*.22,sz*.22,0,Math.PI*2);ctx.fill();ctx.fillStyle='#f97316';ctx.beginPath();ctx.moveTo(x+sz*.54,y-sz*.22);ctx.lineTo(x+sz*.72,y-sz*.18);ctx.lineTo(x+sz*.54,y-sz*.12);ctx.closePath();ctx.fill();ctx.fillStyle='#1e293b';ctx.beginPath();ctx.arc(x+sz*.44,y-sz*.28,sz*.05,0,Math.PI*2);ctx.fill();}
function drawBunny(ctx,x,y,sz,col){ctx.fillStyle=col;ctx.beginPath();ctx.ellipse(x-sz*.15,y-sz*.58,sz*.1,sz*.3,-.15,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(x+sz*.15,y-sz*.58,sz*.1,sz*.3,.15,0,Math.PI*2);ctx.fill();ctx.fillStyle='#fda4af';ctx.beginPath();ctx.ellipse(x-sz*.15,y-sz*.58,sz*.06,sz*.22,-.15,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(x+sz*.15,y-sz*.58,sz*.06,sz*.22,.15,0,Math.PI*2);ctx.fill();ctx.fillStyle=col;ctx.beginPath();ctx.ellipse(x,y,sz*.42,sz*.32,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(x,y-sz*.32,sz*.27,0,Math.PI*2);ctx.fill();ctx.fillStyle='#1e293b';ctx.beginPath();ctx.arc(x-sz*.1,y-sz*.37,sz*.05,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(x+sz*.1,y-sz*.37,sz*.05,0,Math.PI*2);ctx.fill();ctx.fillStyle='#fda4af';ctx.beginPath();ctx.arc(x,y-sz*.26,sz*.04,0,Math.PI*2);ctx.fill();}
function drawCat(ctx,x,y,sz,col){ctx.fillStyle=col;ctx.beginPath();ctx.moveTo(x-sz*.28,y-sz*.42);ctx.lineTo(x-sz*.14,y-sz*.6);ctx.lineTo(x,y-sz*.42);ctx.closePath();ctx.fill();ctx.beginPath();ctx.moveTo(x+sz*.28,y-sz*.42);ctx.lineTo(x+sz*.14,y-sz*.6);ctx.lineTo(x,y-sz*.42);ctx.closePath();ctx.fill();ctx.beginPath();ctx.ellipse(x,y,sz*.45,sz*.33,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(x,y-sz*.32,sz*.27,0,Math.PI*2);ctx.fill();ctx.fillStyle='#1e293b';ctx.beginPath();ctx.arc(x-sz*.1,y-sz*.36,sz*.05,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(x+sz*.1,y-sz*.36,sz*.05,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(0,0,0,.35)';ctx.lineWidth=1.5;[-1,1].forEach(s=>{ctx.beginPath();ctx.moveTo(x+s*sz*.06,y-sz*.26);ctx.lineTo(x+s*sz*.38,y-sz*.28);ctx.stroke();ctx.beginPath();ctx.moveTo(x+s*sz*.06,y-sz*.22);ctx.lineTo(x+s*sz*.38,y-sz*.22);ctx.stroke();});}
function drawFrog(ctx,x,y,sz,col){ctx.fillStyle=col;ctx.beginPath();ctx.ellipse(x,y,sz*.48,sz*.34,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(x,y-sz*.22,sz*.3,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(x-sz*.18,y-sz*.48,sz*.14,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(x+sz*.18,y-sz*.48,sz*.14,0,Math.PI*2);ctx.fill();ctx.fillStyle='#1e293b';ctx.beginPath();ctx.arc(x-sz*.18,y-sz*.48,sz*.07,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(x+sz*.18,y-sz*.48,sz*.07,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(0,0,0,.35)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(x,y-sz*.1,sz*.2,.1,Math.PI-.1);ctx.stroke();}
function drawDog(ctx,x,y,sz,col){ctx.fillStyle=col;ctx.beginPath();ctx.ellipse(x-sz*.28,y-sz*.32,sz*.14,sz*.22,.3,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(x+sz*.28,y-sz*.32,sz*.14,sz*.22,-.3,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(x,y,sz*.45,sz*.33,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(x,y-sz*.3,sz*.28,0,Math.PI*2);ctx.fill();ctx.fillStyle='#d97706';ctx.beginPath();ctx.ellipse(x,y-sz*.18,sz*.16,sz*.11,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#1e293b';ctx.beginPath();ctx.arc(x-sz*.11,y-sz*.36,sz*.05,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(x+sz*.11,y-sz*.36,sz*.05,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(x,y-sz*.2,sz*.05,0,Math.PI*2);ctx.fill();}
function drawElephant(ctx,x,y,sz,col){ctx.fillStyle=col;ctx.beginPath();ctx.ellipse(x-sz*.5,y-sz*.15,sz*.22,sz*.28,-.2,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(x+sz*.5,y-sz*.15,sz*.22,sz*.28,.2,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(x,y,sz*.5,sz*.38,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(x,y-sz*.32,sz*.3,0,Math.PI*2);ctx.fill();ctx.strokeStyle=col;ctx.lineWidth=sz*.18;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(x,y-sz*.12);ctx.quadraticCurveTo(x-sz*.4,y+sz*.1,x-sz*.3,y+sz*.4);ctx.stroke();ctx.fillStyle='#1e293b';ctx.beginPath();ctx.arc(x+sz*.14,y-sz*.38,sz*.06,0,Math.PI*2);ctx.fill();}
function mkAnimals(){const ANIMS=[{name:'duck!',col:'#fbbf24',fn:drawDuck},{name:'bunny!',col:'#f9a8d4',fn:drawBunny},{name:'cat!',col:'#fb923c',fn:drawCat},{name:'frog!',col:'#4ade80',fn:drawFrog},{name:'doggy!',col:'#a78bfa',fn:drawDog},{name:'elephant!',col:'#94a3b8',fn:drawElephant}];let animals=[];function spawn(sx){const def=ANIMS[Math.floor(Math.random()*ANIMS.length)],sz=Math.min(W,H)*.16;animals.push({...def,x:sx||W+sz,y:H*.65,sz,vx:-(0.5+Math.random()*.8)*(W/600),bobT:Math.random()*Math.PI*2,dancing:false,danceT:0,spin:0,jumpY:0,jumpVy:0});}
return{init(){for(let i=0;i<4;i++)spawn(W*.15+i*(W*.22));},update(dt){animals.forEach(a=>{a.bobT+=dt*2.5;if(a.dancing){a.danceT+=dt;a.spin+=dt*7;a.jumpVy+=dt*30;a.jumpY+=a.jumpVy*dt;if(a.jumpY>0){a.jumpY=0;a.jumpVy=Math.abs(a.jumpVy)<3?0:-a.jumpVy*.4;}if(a.danceT>1.5){a.dancing=false;a.spin=0;a.jumpY=0;}}else a.x+=a.vx;if(a.x<-a.sz*2){a.x=W+a.sz;const def=ANIMS[Math.floor(Math.random()*ANIMS.length)];a.fn=def.fn;a.col=def.col;a.name=def.name;}});},
draw(){const bg=ctx.createLinearGradient(0,0,0,H);bg.addColorStop(0,'#7dd3fc');bg.addColorStop(.68,'#86efac');bg.addColorStop(1,'#4ade80');ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);ctx.save();ctx.shadowColor='#fde68a';ctx.shadowBlur=30;ctx.fillStyle='#fbbf24';ctx.beginPath();ctx.arc(W*.82,H*.14,H*.07,0,Math.PI*2);ctx.fill();ctx.restore();ctx.fillStyle='#22c55e';ctx.fillRect(0,H*.72,W,H*.28);ctx.fillStyle='#16a34a';ctx.fillRect(0,H*.72,W,H*.04);function cloud(cx,cy,r){ctx.fillStyle='rgba(255,255,255,.85)';[0,r*.7,-r*.7,r*.5,-r*.4].forEach((dx,i)=>{ctx.beginPath();ctx.arc(cx+dx,cy+[0,-r*.3,-r*.25,-r*.1,-r*.15][i],r*[1,.7,.65,.55,.5][i],0,Math.PI*2);ctx.fill();});}cloud(W*.2,H*.22,H*.06);cloud(W*.55,H*.18,H*.055);cloud(W*.78,H*.28,H*.05);animals.forEach(a=>{ctx.save();const bobY=Math.sin(a.bobT)*5;ctx.translate(a.x,a.y+bobY+a.jumpY);if(a.dancing)ctx.rotate(Math.sin(a.spin)*.35);a.fn(ctx,0,0,a.sz,a.col);ctx.restore();});},
onTap(x,y){for(const a of animals){if(!a.dancing&&Math.hypot(x-a.x,y-a.y)<a.sz*.7){a.dancing=true;a.danceT=0;a.jumpVy=-8;playChime(PENTA[Math.floor(Math.random()*PENTA.length)]);burst(a.x,a.y,8,[a.col,'#fff']);if(window.speechSynthesis){const u=new SpeechSynthesisUtterance(a.name);u.rate=.9;u.pitch=1.2;speechSynthesis.cancel();speechSynthesis.speak(u);}return;}}}}}

// PAINT
function mkPaint(){let dots=[],hue=0,painting=false,clearAnim=0;return{init(){dots=[];},update(dt){clearAnim=Math.max(0,clearAnim-dt*3);for(let i=dots.length-1;i>=0;i--){dots[i].life-=dt*.18;if(dots[i].life<=0)dots.splice(i,1);}},draw(){ctx.fillStyle=`hsl(${hue*.1},8%,98%)`;ctx.fillRect(0,0,W,H);for(const d of dots){ctx.save();ctx.globalAlpha=Math.min(1,d.life*.8);const g=ctx.createRadialGradient(d.x,d.y,0,d.x,d.y,d.r);g.addColorStop(0,`hsla(${d.h},80%,60%,.9)`);g.addColorStop(1,`hsla(${d.h},80%,60%,0)`);ctx.fillStyle=g;ctx.beginPath();ctx.arc(d.x,d.y,d.r,0,Math.PI*2);ctx.fill();ctx.restore();}const bx=W-56,by=H-56,br=34;ctx.save();ctx.shadowColor='#ef4444';ctx.shadowBlur=clearAnim>0?16:6;ctx.fillStyle=clearAnim>0?'#fca5a5':'#ef4444';ctx.beginPath();ctx.arc(bx,by,br,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;ctx.fillStyle='#fff';ctx.font=`bold ${br}px system-ui`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('✕',bx,by+1);ctx.restore();if(dots.length<3){ctx.fillStyle='rgba(0,0,0,.2)';ctx.font=`${Math.min(W,H)*.055}px system-ui`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('Draw anything! 🎨',W/2,H/2);}},
onTap(x,y){if(Math.hypot(x-(W-56),y-(H-56))<46){dots=[];clearAnim=1;playSuccess();confettiAt(W/2,H/2);return;}painting=true;dots.push({x,y,r:22+Math.random()*6,h:hue%360,life:1});},onDrag(x,y){if(!painting)return;hue+=1.2;dots.push({x,y,r:22+Math.random()*6,h:hue%360,life:1});playNote(Math.floor(x/W*PENTA.length));},onDragEnd(){painting=false;}};}

// STARS
function mkStars(){let stars=[],score=0;function drawStar5(cx,cy,r,col){ctx.beginPath();for(let i=0;i<10;i++){const a=Math.PI/5*i-Math.PI/2,ri=i%2===0?r:r*.42;if(i===0)ctx.moveTo(cx+ri*Math.cos(a),cy+ri*Math.sin(a));else ctx.lineTo(cx+ri*Math.cos(a),cy+ri*Math.sin(a));}ctx.closePath();ctx.fillStyle=col;ctx.shadowColor=col;ctx.shadowBlur=18;ctx.fill();ctx.shadowBlur=0;}function spawn(){if(stars.length>=10)return;const ni=Math.floor(Math.random()*PENTA.length);stars.push({x:80+Math.random()*(W-160),y:-60,r:28+Math.random()*22,color:RAINBOW[ni%RAINBOW.length],note:ni,vy:(0.5+Math.random()*.9)*(H/700),rot:0,rotV:(Math.random()-.5)*.04,caught:false,catchT:0,catchR:0,catchA:1});}
return{init(){for(let i=0;i<6;i++)setTimeout(()=>spawn(),i*400);},update(dt){if(Math.random()<dt*1.5)spawn();for(let i=stars.length-1;i>=0;i--){const s=stars[i];if(s.caught){s.catchT+=dt*4;s.catchR+=dt*120;s.catchA-=dt*3;if(s.catchA<=0){stars.splice(i,1);setTimeout(()=>spawn(),600);}}else{s.y+=s.vy;s.rot+=s.rotV;if(s.y>H+60){stars.splice(i,1);setTimeout(()=>spawn(),400);}}}},
draw(t){ctx.fillStyle='#020617';ctx.fillRect(0,0,W,H);for(let i=0;i<60;i++){const sx=(i*137)%W,sy=(i*93)%(H*.85),a=.15+.25*Math.sin(t*2.2+i*.8);ctx.fillStyle=`rgba(255,255,255,${a})`;ctx.beginPath();ctx.arc(sx,sy,.8+(i%3)*.4,0,Math.PI*2);ctx.fill();}ctx.fillStyle='rgba(255,255,255,.9)';ctx.font=`bold ${Math.min(W,H)*.1}px system-ui`;ctx.textAlign='center';ctx.textBaseline='alphabetic';ctx.fillText('⭐ '+score,W/2,H*.12);for(const s of stars){ctx.save();if(s.caught){ctx.globalAlpha=Math.max(0,s.catchA);ctx.beginPath();ctx.arc(s.x,s.y,s.catchR,0,Math.PI*2);ctx.strokeStyle=s.color;ctx.lineWidth=3;ctx.stroke();}else{ctx.translate(s.x,s.y);ctx.rotate(s.rot);drawStar5(ctx,0,0,s.r,s.color);ctx.fillStyle='rgba(255,255,255,.8)';ctx.font=`${s.r*.9}px system-ui`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('♪',0,0);}ctx.restore();}},
onTap(x,y){for(let i=stars.length-1;i>=0;i--){const s=stars[i];if(!s.caught&&Math.hypot(x-s.x,y-s.y)<s.r+18){s.caught=true;score++;playNote(s.note);burst(s.x,s.y,10,[s.color,'#fff']);return;}}}};}

// RAIN
function mkRain(){const RCOLS=['#f43f5e','#f59e0b','#22c55e','#3b82f6','#a855f7','#14b8a6'];let drops=[],pools=[],clouds=[];function mkCloud(cx,cy){return{x:cx,y:cy,r:H*.06,pouring:false,pourT:0};}function spawnDrop(c){drops.push({x:c.x+(Math.random()-.5)*c.r*1.2,y:c.y+c.r*.5,vy:(3+Math.random()*3)*(H/700),color:RCOLS[Math.floor(Math.random()*RCOLS.length)],hit:false,hitR:0,hitA:1});}
return{init(){clouds=[mkCloud(W*.2,H*.17),mkCloud(W*.52,H*.14),mkCloud(W*.8,H*.2)];for(let i=0;i<5;i++)spawnDrop(clouds[Math.floor(Math.random()*clouds.length)]);},update(dt){for(const c of clouds){if(c.pouring){c.pourT+=dt;if(c.pourT>3)c.pouring=false;if(Math.random()<dt*5)spawnDrop(c);}else if(Math.random()<dt*.4)spawnDrop(clouds[Math.floor(Math.random()*clouds.length)]);}for(let i=drops.length-1;i>=0;i--){const d=drops[i];if(d.hit){d.hitR+=dt*80;d.hitA-=dt*2.5;if(d.hitA<=0)drops.splice(i,1);}else{d.y+=d.vy;if(d.y>H*.85){pools.push({x:d.x,y:H*.85,r:8,maxR:40+Math.random()*30,color:d.color,alpha:.7});drops.splice(i,1);}}}for(const p of pools){p.r=Math.min(p.r+dt*15,p.maxR);p.alpha-=dt*.03;}},
draw(){ctx.fillStyle='#374151';ctx.fillRect(0,0,W,H);ctx.fillStyle='#4b5563';ctx.fillRect(0,H*.82,W,H*.18);for(const p of pools){if(p.alpha<=0)continue;ctx.save();ctx.globalAlpha=Math.max(0,p.alpha*.7);ctx.fillStyle=p.color;ctx.beginPath();ctx.ellipse(p.x,p.y,p.r,p.r*.3,0,0,Math.PI*2);ctx.fill();ctx.restore();}for(const c of clouds){ctx.save();if(c.pouring){ctx.shadowColor='rgba(200,220,255,.6)';ctx.shadowBlur=14;}ctx.fillStyle=c.pouring?'#bfdbfe':'rgba(255,255,255,.88)';[0,c.r*.7,-c.r*.7,c.r*.45,-c.r*.4].forEach((dx,i)=>{ctx.beginPath();ctx.arc(c.x+dx,c.y+[0,-c.r*.3,-c.r*.25,-c.r*.08,-c.r*.12][i],c.r*[1,.7,.65,.55,.48][i],0,Math.PI*2);ctx.fill();});ctx.restore();}for(const d of drops){ctx.save();if(d.hit){ctx.globalAlpha=Math.max(0,d.hitA);ctx.beginPath();ctx.arc(d.x,d.y,d.hitR,0,Math.PI*2);ctx.strokeStyle=d.color;ctx.lineWidth=3;ctx.stroke();}else{ctx.fillStyle=d.color;ctx.beginPath();ctx.ellipse(d.x,d.y,9,18,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(255,255,255,.4)';ctx.beginPath();ctx.ellipse(d.x-3,d.y-6,3,6,-.2,0,Math.PI*2);ctx.fill();}ctx.restore();}},
onTap(x,y){for(const c of clouds){if(Math.hypot(x-c.x,y-c.y)<c.r*1.2){c.pouring=true;c.pourT=0;playChime(350);return;}}for(let i=drops.length-1;i>=0;i--){const d=drops[i];if(!d.hit&&Math.hypot(x-d.x,y-d.y)<28){d.hit=true;playChime(400+Math.random()*200);burst(d.x,d.y,6,[d.color]);return;}}}};}

// SQUISH BOUNCE
function lighten(hex,amt){const r=Math.min(255,parseInt(hex.slice(1,3),16)+amt),g=Math.min(255,parseInt(hex.slice(3,5),16)+amt),b=Math.min(255,parseInt(hex.slice(5,7),16)+amt);return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;}
function mkSquish(){const COLS=['#7c3aed','#f43f5e','#f59e0b','#14b8a6','#22c55e','#3b82f6'];let colI=0,color='#7c3aed',scaleX=1,scaleY=1,rot=0,rings=[],tapCount=0,bobT=0,squishY=0;
return{init(){},update(dt){bobT+=dt*1.8;squishY+=((-Math.sin(bobT)*8)-squishY)*.06;scaleX+=(1-scaleX)*.12;scaleY+=(1-scaleY)*.12;rot*=.92;for(let i=rings.length-1;i>=0;i--){const r=rings[i];r.r+=dt*150;r.a-=dt*2.5;if(r.a<=0)rings.splice(i,1);}},
draw(){const bg=ctx.createLinearGradient(0,0,0,H);bg.addColorStop(0,'#4c1d95');bg.addColorStop(.5,'#7c3aed');bg.addColorStop(1,'#a78bfa');ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);ctx.save();ctx.shadowColor=color;ctx.shadowBlur=60;ctx.fillStyle=color+'22';ctx.beginPath();ctx.arc(W/2,H*.5,Math.min(W,H)*.28,0,Math.PI*2);ctx.fill();ctx.restore();for(const r of rings){ctx.save();ctx.globalAlpha=Math.max(0,r.a);ctx.beginPath();ctx.arc(W/2,H*.5,r.r,0,Math.PI*2);ctx.strokeStyle=r.color;ctx.lineWidth=3;ctx.stroke();ctx.restore();}const sz=Math.min(W,H)*.24,cx=W/2,cy=H*.5+squishY;ctx.save();ctx.translate(cx,cy);ctx.rotate(rot);ctx.scale(scaleX,scaleY);ctx.shadowColor=color;ctx.shadowBlur=35;ctx.beginPath();ctx.roundRect(-sz/2,-sz/2,sz,sz,sz*.24);const g=ctx.createLinearGradient(-sz/2,-sz/2,sz/2,sz/2);g.addColorStop(0,lighten(color,35));g.addColorStop(1,color);ctx.fillStyle=g;ctx.fill();ctx.shadowBlur=0;const ey=-sz*.08,ex=sz*.17,er=sz*.1;ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(-ex,ey,er,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(ex,ey,er,0,Math.PI*2);ctx.fill();ctx.fillStyle='#1e0a3c';ctx.beginPath();ctx.arc(-ex,ey,er*.55,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(ex,ey,er*.55,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(255,255,255,.7)';ctx.beginPath();ctx.arc(-ex-er*.2,ey-er*.22,er*.24,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(ex-er*.2,ey-er*.22,er*.24,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=sz*.05;ctx.lineCap='round';ctx.beginPath();ctx.arc(0,sz*.18,sz*.22,.15,Math.PI-.15);ctx.stroke();ctx.fillStyle='rgba(255,255,255,.5)';ctx.font=`${sz*.13}px system-ui`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('tap me!',0,sz*.47);ctx.restore();ctx.fillStyle='rgba(255,255,255,.7)';ctx.font=`bold ${Math.min(W,H)*.09}px system-ui`;ctx.textAlign='center';ctx.textBaseline='alphabetic';ctx.fillText(tapCount,W/2,H*.12);},
onTap(x,y){const sz=Math.min(W,H)*.24;if(Math.hypot(x-W/2,y-H*.5)>sz*.75)return;tapCount++;if(tapCount%3===0){colI=(colI+1)%COLS.length;color=COLS[colI];}scaleX=.72;scaleY=1.36;rot=(Math.random()-.5)*.25;rings.push({r:sz*.55,a:1,color});playBoing();burst(W/2,H*.5-sz*.3,10,[color,'#fff',color]);}};}

// FIREFLIES
function mkFirefly(){let flies=[],score=0,lastCatch=[];function spawn(){flies.push({x:60+Math.random()*(W-120),y:H*.15+Math.random()*(H*.65),r:7+Math.random()*4,phase:Math.random()*Math.PI*2,vx:(Math.random()-.5)*.7,vy:(Math.random()-.5)*.5,lit:false,litT:0,litR:0});}
return{init(){for(let i=0;i<14;i++)spawn();},update(dt){flies.forEach(f=>{f.phase+=dt*1.8;f.x+=f.vx+Math.sin(f.phase)*.4;f.y+=f.vy+Math.cos(f.phase*.7)*.3;f.x=Math.max(30,Math.min(W-30,f.x));f.y=Math.max(H*.05,Math.min(H*.85,f.y));if(f.lit){f.litT+=dt;f.litR+=dt*60;if(f.litT>1.8)f.lit=false;}});},
draw(t){const br=Math.min(1,score*.06);ctx.fillStyle=`hsl(140,${60+br*20}%,${8+br*18}%)`;ctx.fillRect(0,0,W,H);[[W*.05,H*.9,W*.12],[W*.88,H*.88,W*.11],[W*.02,H*.95,W*.08],[W*.93,H*.95,W*.07]].forEach(([tx,ty,tw])=>{ctx.fillStyle='rgba(0,0,0,.55)';ctx.beginPath();ctx.moveTo(tx,ty);ctx.lineTo(tx-tw/2,ty);ctx.lineTo(tx,ty-H*.45);ctx.lineTo(tx+tw/2,ty);ctx.closePath();ctx.fill();});if(lastCatch.length>=2){ctx.strokeStyle='rgba(255,255,200,.25)';ctx.lineWidth=1.5;ctx.setLineDash([6,10]);for(let i=1;i<Math.min(lastCatch.length,4);i++){ctx.beginPath();ctx.moveTo(lastCatch[i-1].x,lastCatch[i-1].y);ctx.lineTo(lastCatch[i].x,lastCatch[i].y);ctx.stroke();}ctx.setLineDash([]);}ctx.fillStyle='rgba(255,255,200,.85)';ctx.font=`bold ${Math.min(W,H)*.1}px system-ui`;ctx.textAlign='center';ctx.textBaseline='alphabetic';ctx.fillText('✨ '+score,W/2,H*.12);for(const f of flies){const pulse=.4+.6*Math.sin(t*3+f.phase);ctx.save();if(f.lit){ctx.shadowColor='#fef08a';ctx.shadowBlur=40;ctx.globalAlpha=Math.max(0,1-f.litT*.6);ctx.beginPath();ctx.arc(f.x,f.y,f.litR,0,Math.PI*2);ctx.strokeStyle='rgba(254,240,138,.5)';ctx.lineWidth=2;ctx.stroke();ctx.shadowBlur=0;}ctx.globalAlpha=.35+pulse*.65;const g=ctx.createRadialGradient(f.x,f.y,0,f.x,f.y,f.r*3);g.addColorStop(0,'rgba(254,240,138,.9)');g.addColorStop(1,'rgba(254,240,138,0)');ctx.fillStyle=g;ctx.beginPath();ctx.arc(f.x,f.y,f.r*3,0,Math.PI*2);ctx.fill();ctx.fillStyle=f.lit?'#fff':'#fef08a';ctx.beginPath();ctx.arc(f.x,f.y,f.r,0,Math.PI*2);ctx.fill();ctx.restore();}},
onTap(x,y){for(const f of flies){if(!f.lit&&Math.hypot(x-f.x,y-f.y)<f.r+20){f.lit=true;f.litT=0;f.litR=0;score++;playChime(600+Math.random()*300);burst(f.x,f.y,8,['#fef08a','#fff','#fbbf24']);lastCatch.push({x:f.x,y:f.y});if(lastCatch.length>4)lastCatch.shift();if(score%3===0)playSuccess();return;}}}}}

// WEATHER
function mkWeather(){const WS=['sunny','cloudy','rain','snow','rainbow','night'],WL=['☀️ Sunny','☁️ Cloudy','🌧 Rain','❄️ Snow','🌈 Rainbow','🌟 Night'];let wI=0,wpar=[],swipeStart=null;const SKY={sunny:['#0ea5e9','#7dd3fc'],cloudy:['#6b7280','#9ca3af'],rain:['#374151','#4b5563'],snow:['#93c5fd','#bfdbfe'],rainbow:['#818cf8','#c4b5fd'],night:['#020617','#1e1b4b']};function nextW(dir){wI=(wI+dir+WS.length)%WS.length;wpar=[];playBoing();burst(W/2,H*.4,12,RAINBOW);}function spawnPar(){const w=WS[wI];if(w==='rain'&&wpar.length<50)wpar.push({x:Math.random()*W,y:-20,vy:6+Math.random()*4,vx:.5,w:2,h:16,color:'#93c5fd',a:.8,type:'rain'});if(w==='snow'&&wpar.length<40)wpar.push({x:Math.random()*W,y:-20,vy:1.5+Math.random()*2,vx:(Math.random()-.5)*1.5,r:3+Math.random()*4,color:'#e0f2fe',a:.9,type:'snow'});if(w==='night'&&wpar.length<60)wpar.push({x:Math.random()*W,y:Math.random()*H*.7,r:1+Math.random()*2,color:'#fff',a:Math.random(),type:'star',tw:Math.random()*Math.PI*2});}
return{init(){},update(dt){spawnPar();for(let i=wpar.length-1;i>=0;i--){const p=wpar[i];if(p.type==='star'){p.tw+=dt*2.5;p.a=.3+.5*Math.sin(p.tw);continue;}p.x+=p.vx;p.y+=p.vy;if(p.y>H+20||p.x<-20||p.x>W+20)wpar.splice(i,1);}},
draw(t){const sk=SKY[WS[wI]];const bg=ctx.createLinearGradient(0,0,0,H);bg.addColorStop(0,sk[0]);bg.addColorStop(1,sk[1]);ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);const gCol=WS[wI]==='night'?'#1e1b4b':WS[wI]==='snow'?'#e0f2fe':'#4ade80';ctx.fillStyle=gCol;ctx.fillRect(0,H*.78,W,H*.22);const w=WS[wI];if(w==='sunny'){ctx.save();ctx.shadowColor='#fde68a';ctx.shadowBlur=40;ctx.fillStyle='#fbbf24';ctx.beginPath();ctx.arc(W*.75,H*.2,H*.1,0,Math.PI*2);ctx.fill();for(let i=0;i<8;i++){const a=Math.PI/4*i+t*.3;ctx.strokeStyle='#fde68a';ctx.lineWidth=4;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(W*.75+Math.cos(a)*H*.13,H*.2+Math.sin(a)*H*.13);ctx.lineTo(W*.75+Math.cos(a)*H*.17,H*.2+Math.sin(a)*H*.17);ctx.stroke();}ctx.restore();}if(w==='cloudy'||w==='rain'||w==='snow'){[[W*.22,H*.18,H*.08],[W*.62,H*.15,H*.07],[W*.85,H*.25,H*.065]].forEach(([cx,cy,r])=>{ctx.fillStyle='rgba(255,255,255,.88)';[0,r*.7,-r*.7,r*.45,-r*.4].forEach((dx,i)=>{ctx.beginPath();ctx.arc(cx+dx,cy+[0,-r*.3,-r*.25,-r*.1,-r*.15][i],r*[1,.7,.65,.55,.5][i],0,Math.PI*2);ctx.fill();});});}if(w==='rainbow'){['#ef4444','#f97316','#eab308','#22c55e','#3b82f6','#8b5cf6','#ec4899'].forEach((c,i)=>{ctx.beginPath();ctx.arc(W/2,H*.9,W*(.3+i*.04),Math.PI,0);ctx.strokeStyle=c+'cc';ctx.lineWidth=H*.022;ctx.stroke();});}if(w==='night'){ctx.save();ctx.shadowColor='#fde68a';ctx.shadowBlur=20;ctx.fillStyle='#fef08a';ctx.beginPath();ctx.arc(W*.78,H*.2,H*.065,0,Math.PI*2);ctx.fill();ctx.restore();}for(const p of wpar){ctx.save();ctx.globalAlpha=Math.max(0,p.a);if(p.type==='rain')ctx.fillRect(p.x,p.y,p.w,p.h);else{ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();}ctx.restore();}ctx.fillStyle='rgba(255,255,255,.9)';ctx.font=`bold ${Math.min(W,H)*.055}px system-ui`;ctx.textAlign='center';ctx.textBaseline='alphabetic';ctx.fillText(WL[wI],W/2,H*.9);ctx.fillStyle='rgba(255,255,255,.45)';ctx.font=`${Math.min(W,H)*.035}px system-ui`;ctx.fillText('← swipe to change →',W/2,H*.94);},
onTap(){},onSwipe(dx){nextW(dx>0?1:-1);},onDrag(){},onDragEnd(x,y,dx){if(Math.abs(dx)>55)nextW(dx>0?1:-1);}};}

// INPUT
let dragStart=null,lastDrag=null;
function getPos(e,t){const s=t?e.touches[0]||e.changedTouches[0]:e;return{x:s.clientX,y:s.clientY};}
function onDown(x,y){unlockAudio();dragStart={x,y};lastDrag={x,y};if(state==='chooser'){chooserTap(x,y);return;}if(state==='game'){if(isBack(x,y)){state='chooser';G=null;return;}if(G&&G.onTap)G.onTap(x,y);}}
function onMove(x,y){if(!dragStart)return;lastDrag={x,y};if(state==='game'&&G&&G.onDrag)G.onDrag(x,y);}
function onUp(x,y){if(!dragStart)return;const dx=x-dragStart.x;if(state==='game'&&G){if(Math.abs(dx)>55&&G.onSwipe)G.onSwipe(dx);if(G.onDragEnd)G.onDragEnd(x,y,dx);}dragStart=null;lastDrag=null;}
C.addEventListener('mousedown',e=>{const p=getPos(e);onDown(p.x,p.y);});
window.addEventListener('mousemove',e=>{const p=getPos(e);onMove(p.x,p.y);});
window.addEventListener('mouseup',e=>{const p=getPos(e);onUp(p.x,p.y);});
C.addEventListener('touchstart',e=>{e.preventDefault();const p=getPos(e,true);onDown(p.x,p.y);},{passive:false});
C.addEventListener('touchmove',e=>{e.preventDefault();const p=getPos(e,true);onMove(p.x,p.y);},{passive:false});
C.addEventListener('touchend',e=>{e.preventDefault();const p=getPos(e,true);onUp(p.x,p.y);},{passive:false});

// LOOP
let lastTs=null;
function loop(ts){requestAnimationFrame(loop);const dt=lastTs?Math.min((ts-lastTs)/1000,.05):.016;lastTs=ts;T+=dt;ctx.clearRect(0,0,W,H);if(state==='chooser')drawChooser();else if(state==='game'&&G){if(G.update)G.update(dt);if(G.draw)G.draw(T);drawBack();}tickPar(dt);drawPar();}
resize();
requestAnimationFrame(loop);
</script>
