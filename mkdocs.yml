site_name: Squish
site_description: "Fast local LLMs on Apple Silicon: sub-second model loads, faster than Ollama on long prompts. OpenAI and Ollama-compatible."
site_url: https://squish.run
repo_url: https://github.com/konjoai/squish
repo_name: konjoai/squish

theme:
  name: material
  custom_dir: overrides
  logo: assets/squish-logo.png
  favicon: assets/squish-logo.png
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight

plugins:
  - search
  - exclude:
      glob:
        - "final/**"
        - "*.docx"

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets:
      base_path: .        # relative to mkdocs.yml (repo root)
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Installation: install.md
  - Quickstart: quickstart.md
  - API Reference: api.md
  - Architecture: ARCHITECTURE.md
  - Contributing: contributing.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/konjoai/squish
    - icon: fontawesome/brands/discord
      link: https://discord.gg/squish
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/squish-ai/

extra_css:
  - stylesheets/extra.css
