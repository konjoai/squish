site_name: Squish
site_description: "Fast local LLMs on Apple Silicon: sub-second model loads, faster than Ollama on long prompts. OpenAI and Ollama-compatible."
site_url: https://squish.run
repo_url: https://github.com/konjoai/squish
repo_name: konjoai/squish

theme:
  name: material
  custom_dir: overrides
  logo: assets/squish-logo-1.png
  favicon: assets/squish-logo-1.png
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight

plugins:
  - search
  - exclude:
      glob:
        - "final/**"
        - "*.docx"
  - blog:
      blog_dir: blog
      blog_toc: true
      post_url_format: "{slug}"
      post_excerpt: optional
      authors_file: "{blog}/.authors.yml"
  - rss:
      match_path: blog/posts/.*
      date_from_meta:
        as_creation: date
      categories:
        - categories
        - tags

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets:
      base_path: .        # relative to mkdocs.yml (repo root)
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Installation: install.md
  - Quickstart: quickstart.md
  - API Reference: api.md
  - Benchmarks:
      - Results: RESULTS.md
      - Benchmark Guide: benchmark_guide.md
      - Multi-Model: benchmark_multi_model.md
      - INT4 / INT3 / INT2: benchmark_int_quant.md
      - INT3 vs INT2: benchmark_int3_int2.md
      - 2-bit Comparison: benchmark_2bit.md
  - Guides:
      - MoE Models: moe_guide.md
      - VS Code Agent: vscode-agent.md
      - GitHub Actions: github-actions.md
      - Troubleshooting: troubleshooting.md
  - Architecture: ARCHITECTURE.md
  - Integrations:
      - OpenClaw: integrations/openclaw.md
  - Reference:
      - SQUIZD Format: squizd_format_spec.md
      - Paper: paper.md
  - Contributing: contributing.md
  - Blog:
      - blog/index.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/konjoai/squish
    - icon: fontawesome/brands/discord
      link: https://discord.gg/squish
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/squish-ai/

extra_css:
  - stylesheets/extra.css
