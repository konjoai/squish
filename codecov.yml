# Codecov configuration — https://docs.codecov.com/docs/codecovyml-reference
#
# Coverage is measured on the Apple-Silicon CI runner (the `coverage` job in
# .github/workflows/ci.yml) so MLX inference paths actually execute.  Status
# checks are informational — they annotate PRs but never block the merge, since
# the hard test gates live in the `test` jobs.

coverage:
  precision: 1
  round: down
  range: "60...90"            # red → green band shown in the UI
  status:
    project:
      default:
        target: auto          # compare against the base commit
        threshold: 2%         # allow a 2% dip without flipping red
        informational: true   # never fail the merge on coverage
    patch:
      default:
        informational: true

comment:
  layout: "reach, diff, flags, files"
  behavior: default
  require_changes: false

# Files that are not product source — keep them out of the denominator.
ignore:
  - "tests/**"
  - "**/__main__.py"
  - "squish/vendor/**"
  - "setup.py"
  - "docs/**"
  - "helm/**"
