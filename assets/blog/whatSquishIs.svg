<style> .squish-diagram-zoom { position: relative; cursor: zoom-in; } .squish-diagram-zoom::after { content: "\2922"; position: absolute; top: 12px; right: 16px; color: rgba(255,255,255,0.45); font-size: 20px; line-height: 1; pointer-events: none; } .squish-diagram-zoom.squish-zoomed { position: fixed !important; top: 0 !important; left: 0 !important; right: 0 !important; bottom: 0 !important; width: 100vw !important; height: 100vh !important; margin: 0 !important; padding: 24px !important; border-radius: 0 !important; z-index: 9999; display: flex; align-items: center; justify-content: center; cursor: zoom-out; background: rgba(0,0,0,0.97) !important; overflow: auto; } .squish-diagram-zoom.squish-zoomed::after { content: "\2715"; top: 20px; right: 24px; font-size: 22px; } .squish-diagram-zoom.squish-zoomed > div { width: 92vw !important; max-width: 1400px !important; max-height: 92vh; flex-shrink: 0; } .squish-diagram-zoom.squish-zoomed svg { display: block; width: 100% !important; height: auto !important; } body.squish-zoom-lock { overflow: hidden; } body.squish-zoom-lock .md-top, body.squish-zoom-lock .md-header, body.squish-zoom-lock .md-tabs { display: none !important; } </style> <script> function squishToggleZoom(el) { el.classList.toggle('squish-zoomed'); document.body.classList.toggle('squish-zoom-lock', el.classList.contains('squish-zoomed')); } document.addEventListener('keydown', function (e) { if (e.key !== 'Escape') return; document.querySelectorAll('.squish-diagram-zoom.squish-zoomed').forEach(function (el) { el.classList.remove('squish-zoomed'); }); document.body.classList.remove('squish-zoom-lock'); }); </script>
