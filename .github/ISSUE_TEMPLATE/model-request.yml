name: Model Request
description: Request a new model to be added to the Squish catalog
labels: ["model-request"]
body:
  - type: markdown
    attributes:
      value: |
        Request a model to be added to the Squish catalog.
        Check the [existing catalog](https://github.com/konjoai/squish/blob/main/squish/catalog.py) first
        to make sure the model isn't already supported.

  - type: input
    id: model_name
    attributes:
      label: Model name / HuggingFace ID
      description: The HuggingFace model ID or common model name.
      placeholder: "mistralai/Mistral-7B-Instruct-v0.3"
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Why should this model be added?
      description: Use case, popularity, unique capabilities, benchmark results.
    validations:
      required: true

  - type: dropdown
    id: model_size
    attributes:
      label: Approximate model size
      options:
        - "< 1B parameters"
        - "1B – 3B parameters"
        - "4B – 7B parameters"
        - "8B – 14B parameters"
        - "15B – 30B parameters"
        - "> 30B parameters"
    validations:
      required: true

  - type: textarea
    id: quant
    attributes:
      label: Preferred quantization(s)
      description: Which quantization formats matter most to you?
      placeholder: "INT4 (default), INT3 (memory-constrained)"

  - type: input
    id: license
    attributes:
      label: Model license
      description: e.g. Apache 2.0, MIT, Llama Community License
      placeholder: "Apache 2.0"

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links to benchmarks, HuggingFace page, or any other relevant info.
