name: "Konjo Quality Gate — Wall 2"
on:
  pull_request: {branches: [main]}
  push: {branches: [main]}
concurrency:
  group: konjo-${{ github.ref }}
  cancel-in-progress: true
jobs:
  static:
    name: "G1 · Static Analysis"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install ruff mypy vulture bandit --quiet
      - run: ruff check .
      - run: ruff format --check .
      - {name: vulture, continue-on-error: true, run: "vulture . --min-confidence 80"}
      - {name: bandit, continue-on-error: true, run: "bandit -r . -ll -q --exclude .venv,venv,tests,apps"}
  coverage:
    name: "G2 · Tests + Coverage"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install pytest pytest-cov --quiet && pip install -e . --quiet 2>/dev/null || true
      - {name: "Run tests", continue-on-error: true, run: "python -m pytest tests/ --cov=. --cov-report=json --cov-fail-under=80 -x -q"}
      - name: Coverage gate
        if: always()
        continue-on-error: true
        run: |
          python3 -c "
          import json,sys
          try:
            d=json.load(open('coverage.json')); pct=d['totals']['percent_covered']
            print(f'Coverage: {pct:.1f}%')
            if pct<80: print('::error::Coverage<80%'); sys.exit(1)
          except Exception as e: print(f'unavailable: {e}')
          "
  mutation:
    name: "G3 · Mutation Testing"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install mutmut pytest --quiet && pip install -e . --quiet 2>/dev/null || true
      - {continue-on-error: true, run: "mutmut run 2>&1 | tail -60 || true"}
  complexity:
    name: "G4 · Complexity + Size + DRY"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install radon interrogate --quiet
      - name: Complexity
        continue-on-error: true
        run: |
          COUNT=$(radon cc . -n C --json 2>/dev/null | python3 -c "import json,sys; d=json.load(sys.stdin); print(sum(len(v) for v in d.values()))" 2>/dev/null || echo 0)
          [ "$COUNT" -gt 0 ] && radon cc . -n C -s && exit 1; echo "✓"
      - name: File size
        continue-on-error: true
        run: |
          while IFS= read -r -d '' f; do LC=$(wc -l < "$f"); [ "$LC" -gt 500 ] && echo "OVERSIZED: $f ($LC)" && exit 1; done < <(find . -name "*.py" | grep -v __pycache__ | grep -v "apps/macos" | tr '\n' '\0')
          echo "✓"
      - name: DRY
        continue-on-error: true
        run: |
          python3 .konjo/scripts/dry_check.py --threshold 0.85 --min-lines 20 --report dry_report.json
          COUNT=$(python3 -c "import json; print(json.load(open('dry_report.json'))['count'])")
          [ "$COUNT" -gt 0 ] && exit 1; echo "DRY ✓"
      - {name: Docs, continue-on-error: true, run: "interrogate . --fail-under 80 -q 2>/dev/null || true"}
  # G5 disabled — run locally: git diff HEAD~1 | python3 .konjo/scripts/konjo_review.py
  konjo-gate:
    name: "Konjo Gate — All Walls Clear"
    runs-on: ubuntu-latest
    if: always()
    needs: [static, coverage, complexity]
    steps:
      - name: Evaluate gates
        run: |
          FAILED=""
          [ "${{ needs.static.result }}" != "success" ] && FAILED="$FAILED static"
          [ "${{ needs.coverage.result }}" != "success" ] && FAILED="$FAILED coverage"
          [ "${{ needs.complexity.result }}" != "success" ] && FAILED="$FAILED complexity"
          [ -n "$FAILED" ] && echo "::error::Failed:$FAILED" && exit 1
          echo "All Konjo gates passed ✓ The code is seaworthy."
