name: CI

on:
  push:
    branches: [main, "feat/**", "fix/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_hardware:
        description: "Run hardware integration tests (requires macos-14 Apple Silicon)"
        type: boolean
        default: false
      hardware_model:
        description: "HuggingFace model ID for hardware tests"
        type: string
        default: "mlx-community/Qwen2.5-1.5B-Instruct-4bit"
      e2e_model:
        description: "HuggingFace model ID for the Apple-Silicon e2e battle-test (bump to 1.5B for the full run)"
        type: string
        default: "mlx-community/Qwen2.5-0.5B-Instruct-4bit"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: macos-14            # Apple Silicon runner (M1)
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pytest-timeout

      - name: Lint (ruff)
        run: |
          ruff check squish/ tests/ --output-format github --exit-zero

      - name: Verify version consistency
        run: |
          python -c "
          import importlib.metadata, squish
          meta = importlib.metadata.version(squish.__dist_name__)
          pkg  = squish.__version__
          assert meta == pkg, f'Version mismatch: metadata={meta!r} vs squish.__version__={pkg!r}'
          print(f'{squish.__dist_name__} version OK: {pkg}')
          "

      - name: Run tests
        # Excluded from CI:
        #   test_git_integration.py - live-server integration requiring model weights.
        #                             Run: pytest tests/test_git_integration.py --model qwen3:8b
        #   tests/quant/test_int4_loader.py - requires squish_quant Rust extension (cargo/maturin).
        #   The following files have module-level Metal/MLX imports (directly or via squish modules).
        #   On macOS CI runners the Metal GPU context is not ready at pytest collection time;
        #   the bare import triggers Metal init → SIGABRT (exit 134) killing the entire process.
        #   All must be run manually on real Apple Silicon hardware with a warmed Metal context.
        #   tests/test_sqint2_linear.py   - module-level mlx.core import → Metal SIGABRT
        #   tests/test_backend_unit.py    - module-level mlx.core import → Metal SIGABRT
        #   tests/quant/test_int3_linear_unit.py - module-level mlx.core import → Metal SIGABRT
        #   tests/hardware/test_fused_kernels_unit.py - importorskip(mlx.core) → imports
        #       squish.hardware.fused_kernels which has module-level mlx.nn → Metal SIGABRT
        run: |
          pytest tests/ \
            --ignore=tests/test_git_integration.py \
            --ignore=tests/quant/test_int4_loader.py \
            --ignore=tests/test_sqint2_linear.py \
            --ignore=tests/test_backend_unit.py \
            --ignore=tests/quant/test_int3_linear_unit.py \
            --ignore=tests/hardware/test_fused_kernels_unit.py \
            --timeout=60 \
            -v --tb=short -q

  # ---------------------------------------------------------------------------
  # Rust extension build + full test suite (including test_int4_loader.py)
  # Runs on macOS-14 (Apple Silicon) with Python 3.12 only.
  # ---------------------------------------------------------------------------
  test-rust:
    name: Test Rust extension (macOS + Python 3.12)
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install Python dependencies + maturin
        run: |
          python -m pip install --upgrade pip
          python -m venv .venv
          .venv/bin/pip install -e ".[dev]"
          .venv/bin/pip install pytest-timeout maturin

      - name: Build squish_quant_rs Rust extension
        # maturin develop requires a virtualenv; use the venv's maturin directly.
        working-directory: squish_quant_rs
        run: ../.venv/bin/maturin develop --release

      - name: Run full test suite (Rust extension available)
        # test_int4_loader.py is now included — requires squish_quant built above.
        # test_git_integration.py still excluded (needs live model weights).
        # Metal SIGABRT exclusions (module-level mlx.core/mlx.nn import → exit 134 at collection time):
        #   test_sqint2_linear.py, test_backend_unit.py, test_int3_linear_unit.py,
        #   tests/hardware/test_fused_kernels_unit.py (importorskip → mlx.nn via fused_kernels)
        run: |
          .venv/bin/pytest tests/ \
            --ignore=tests/test_git_integration.py \
            --ignore=tests/test_sqint2_linear.py \
            --ignore=tests/test_backend_unit.py \
            --ignore=tests/quant/test_int3_linear_unit.py \
            --ignore=tests/hardware/test_fused_kernels_unit.py \
            --timeout=120 \
            -v --tb=short -q

  lint-only:
    # Runs on Linux for fast feedback on PRs from forks (no Apple Silicon needed)
    name: Lint (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff + mypy
        run: pip install ruff mypy

      - name: ruff check
        run: ruff check squish/ tests/ --output-format github --exit-zero

      - name: mypy check
        run: mypy squish/ --ignore-missing-imports --no-error-summary || true

  test-linux:
    name: Test Linux (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pytest-timeout

      - name: Lint (ruff)
        run: |
          ruff check squish/ tests/ --output-format github --exit-zero

      - name: Run tests (Linux — MLX tests auto-skipped)
        # MLX-dependent tests skip automatically on Linux via pytest.importorskip.
        # test_int4_loader.py excluded: requires squish_quant Rust extension
        #   which needs cargo/maturin on the runner.
        # test_git_integration.py excluded: requires live model weights.
        run: |
          pytest tests/ \
            --ignore=tests/quant/test_int4_loader.py \
            --ignore=tests/test_git_integration.py \
            --timeout=60 \
            -v --tb=short -q

  # ---------------------------------------------------------------------------
  # Docker image validation — lints Dockerfiles with hadolint and does a
  # BuildKit syntax/semantic check of the CPU image.
  # Runs on ubuntu-latest (no GPU required).
  # The CUDA image is linted only; a real CUDA build requires a GPU runner.
  # ---------------------------------------------------------------------------
  docker-build:
    name: Docker build (validate Dockerfiles)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # hadolint is a Dockerfile best-practice linter (no network access needed)
      - name: Lint Dockerfile.cpu (hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: docker/Dockerfile.cpu
          # DL3008: apt pin versions — git/curl don't need pinning in infra images
          # DL3013: pip pin versions — torch is pinned; other squish extras use >=
          # DL3059: multiple consecutive RUN — intentional for layer caching
          ignore: DL3008,DL3013,DL3059

      - name: Lint Dockerfile.cuda (hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: docker/Dockerfile.cuda
          ignore: DL3008,DL3013,DL3059

      # BuildKit --check validates Dockerfile syntax + instruction semantics
      # without executing any RUN commands.  CPU base (python:3.11-slim) is
      # small enough to pull here; CUDA base (~3 GB) is skipped.
      - name: Validate CPU Dockerfile (BuildKit check)
        run: docker buildx build --check -f docker/Dockerfile.cpu .

  # ---------------------------------------------------------------------------
  # Hardware integration tests — runs only on manual workflow_dispatch when
  # run_hardware == true.  Requires Apple Silicon (macos-14) and will download
  # ~900 MB of model weights from HuggingFace.
  # ---------------------------------------------------------------------------
  hardware-integration:
    name: Hardware Integration (Apple Silicon)
    runs-on: macos-14
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_hardware == true }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies (including MLX)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install mlx mlx-lm

      - name: Cache HuggingFace model weights
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-model-${{ inputs.hardware_model || 'mlx-community/Qwen2.5-1.5B-Instruct-4bit' }}

      - name: Run hardware integration tests
        env:
          HF_HUB_DISABLE_PROGRESS_BARS: "1"
        run: |
          pytest tests/integration/test_hardware_integration.py \
            --run-hardware \
            --model "${{ inputs.hardware_model || 'mlx-community/Qwen2.5-1.5B-Instruct-4bit' }}" \
            -v --tb=short

  # ---------------------------------------------------------------------------
  # End-to-end battle-test on real Apple Silicon: boots a live squish server
  # against a small MLX model and hammers every endpoint + CLI command with
  # valid and adversarial input.  Runs on PRs to main with the 0.5B model;
  # use workflow_dispatch with e2e_model to swap to 1.5B for the full run.
  # ---------------------------------------------------------------------------
  e2e-apple-silicon:
    name: E2E Battle-Test (Apple Silicon)
    runs-on: macos-14            # Apple Silicon runner (M1)
    if: ${{ github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' }}

    env:
      E2E_MODEL: ${{ inputs.e2e_model || 'mlx-community/Qwen2.5-0.5B-Instruct-4bit' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies (including MLX)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install mlx mlx-lm

      - name: Cache HuggingFace model weights
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-e2e-${{ env.E2E_MODEL }}

      - name: Pre-warm + pre-scan model
        env:
          HF_HUB_DISABLE_PROGRESS_BARS: "1"
        run: |
          # Pre-download scan runs at `squish pull hf:` time (CLAUDE.md constraint).
          python -m squish pull "hf:${E2E_MODEL}"

      - name: Run e2e battle-test
        env:
          SQUISH_E2E: "1"
          HF_HUB_DISABLE_PROGRESS_BARS: "1"
        run: |
          SQUISH_E2E=1 python -m pytest tests/e2e/ \
            --run-e2e \
            --model "${E2E_MODEL}" \
            --timeout=300 \
            -v --tb=short

  # ---------------------------------------------------------------------------
  # Helm chart linting — validates chart structure and template syntax.
  # Runs on every push/PR.  Requires `helm` which is pre-installed on
  # ubuntu-latest runners.
  # ---------------------------------------------------------------------------
  helm-lint:
    name: Helm lint (squish-serve chart)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Lint Helm chart
        run: helm lint helm/squish-serve --strict

      - name: Helm template (dry-run render)
        # Render with non-default values to exercise conditional blocks:
        #   - autoscaling HPA enabled
        #   - KEDA ScaledObject enabled
        #   - CPU-only flavour (no GPU resource limits)
        run: |
          helm template squish-test helm/squish-serve \
            --set image.flavour=cpu \
            --set resources.limits={} \
            --set autoscaling.enabled=true \
            | grep -c "^---" || true
          helm template squish-test helm/squish-serve \
            --set keda.enabled=true \
            | grep -c "^---" || true

  # ---------------------------------------------------------------------------
  # Multi-arch Docker image build + push to ghcr.io.
  # Triggered only on version tags (v*.*.*) to avoid pushing on every PR.
  # Builds:
  #   ghcr.io/squishai/squish:<tag>-cpu   — linux/amd64 + linux/arm64
  #   ghcr.io/squishai/squish:<tag>-cuda  — linux/amd64 only (CUDA is x86-64)
  #   ghcr.io/squishai/squish:latest-{cpu,cuda}  (on default branch tags)
  # ---------------------------------------------------------------------------
  docker-push:
    name: Build + push multi-arch images
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (cross-arch emulation for arm64)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version tag
        id: meta
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build + push CPU image (linux/amd64 + linux/arm64)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.cpu
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/squishai/squish:${{ steps.meta.outputs.VERSION }}-cpu
            ghcr.io/squishai/squish:latest-cpu
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build + push CUDA image (linux/amd64)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.cuda
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/squishai/squish:${{ steps.meta.outputs.VERSION }}-cuda
            ghcr.io/squishai/squish:latest-cuda
          cache-from: type=gha
          cache-to: type=gha,mode=max
