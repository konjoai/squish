name: Publish to PyPI

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write      # needed to create a GitHub Release and push formula update
  id-token: write      # needed for OIDC Trusted Publisher upload

jobs:
  build-and-publish:
    name: Build & upload to PyPI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tooling
        run: pip install build

      - name: Build wheel + sdist
        run: python -m build

      - name: Verify distribution
        run: pip install twine && twine check dist/*

      - name: Publish to PyPI (Trusted Publisher / OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # release.yml's own publish-pypi job (triggered by the push to main
          # that bumped pyproject.toml) races this tag-push-triggered job and
          # almost always finishes first, since it skips the twine check step
          # above. Without skip_existing, PyPI's "file already exists" 400
          # from that redundant upload fails this step — which then skips
          # "Create GitHub Release" below, so no release notes ever get
          # written. skip_existing makes the redundant upload a no-op instead
          # of a failure, matching release.yml's own publish step.
          skip_existing: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew formula URL and sha256
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          PYPI_URL="https://files.pythonhosted.org/packages/source/s/squish-ai/squish_ai-${VERSION}.tar.gz"

          # Wait for PyPI CDN propagation (up to 60s)
          for i in 1 2 3 4; do
            sleep 15
            HTTP=$(curl -sI "${PYPI_URL}" | head -1 | awk '{print $2}')
            [ "${HTTP}" = "200" ] && break
            echo "PyPI not yet propagated (attempt ${i}/4)..."
          done

          SHA256=$(curl -sL "${PYPI_URL}" | shasum -a 256 | awk '{print $1}')
          if [ -z "${SHA256}" ]; then
            echo "ERROR: Could not compute sha256 for ${PYPI_URL}" >&2
            exit 1
          fi

          sed -i \
            "s|url \"https://files.pythonhosted.org/packages/source/s/squish-ai/squish_ai-[0-9.]*\.tar\.gz\"|url \"${PYPI_URL}\"|" \
            Formula/squish.rb
          sed -i \
            "/url.*squish_ai.*tar\.gz/{n;s|sha256 \"[a-f0-9]*\"|sha256 \"${SHA256}\"|}"\
            Formula/squish.rb

          # NOTE: Resource blocks for Python dependencies are NOT automatically
          # updated here. If you bumped a dependency version (e.g. orjson), manually
          # regenerate resource blocks before tagging:
          #   pip install squish-ai homebrew-pypi-poet && poet squish-ai
          # Then commit the updated Formula/squish.rb.

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/squish.rb
          git commit -m "chore: bump formula to v${VERSION}" || echo "No formula changes to commit"

          # release.yml's own update-formula job may push a formula commit to
          # main around the same time (same trigger, same computed URL/sha256)
          # — retry with a rebase instead of failing outright on a rejected
          # push. If that commit already made the identical change, the
          # rebase drops this one as empty and the push becomes a no-op.
          for i in 1 2 3; do
            git push && break
            echo "Push rejected (attempt ${i}/3) — rebasing onto latest main..."
            git fetch origin main
            git rebase origin/main
            sleep 3
          done
