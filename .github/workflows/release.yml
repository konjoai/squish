# Required secrets:
#   HOMEBREW_TAP_TOKEN — GitHub Personal Access Token with repo scope for both
#   konjoai/squish and konjoai/homebrew-squish. Create at:
#   https://github.com/settings/tokens and add to:
#   https://github.com/konjoai/squish/settings/secrets/actions
#
# GITHUB_TOKEN is provided automatically by GitHub Actions (no setup needed).

name: Release

on:
  push:
    branches: [main]

  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 9.33.5) — leave blank to auto-detect from pyproject.toml"
        required: false
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  # ── Step 1: Detect or accept version ──────────────────────────────────────
  detect-version:
    name: Detect version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      should_release: ${{ steps.ver.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Resolve version
        id: ver
        run: |
          # Manual dispatch with explicit version
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "should_release=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Auto-detect from pyproject.toml diff
          NEW=$(grep '^version' pyproject.toml | head -1 | sed 's/version = "//;s/"//')
          OLD=$(git show HEAD~1:pyproject.toml 2>/dev/null | \
                grep '^version' | head -1 | sed 's/version = "//;s/"//' || echo "")
          echo "version=$NEW" >> $GITHUB_OUTPUT
          if [ "$NEW" != "$OLD" ] && [ -n "$OLD" ]; then
            echo "should_release=true" >> $GITHUB_OUTPUT
          else
            echo "should_release=false" >> $GITHUB_OUTPUT
          fi

  # ── Step 2: Tag ───────────────────────────────────────────────────────────
  tag:
    name: Create git tag
    needs: detect-version
    if: needs.detect-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ needs.detect-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Tag and push
        run: |
          VERSION="${{ needs.detect-version.outputs.version }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Skip if tag already exists (idempotent)
          if git ls-remote --tags origin | grep -q "refs/tags/v${VERSION}$"; then
            echo "Tag v${VERSION} already exists — skipping"
          else
            git tag "v${VERSION}"
            git push origin "v${VERSION}"
            echo "✓ Tagged v${VERSION} — publish.yml and build-squishbar.yml now firing"
          fi

  # ── Step 3: Publish to PyPI ───────────────────────────────────────────────
  publish-pypi:
    name: Publish squish-ai to PyPI
    needs: [detect-version, tag]
    if: needs.detect-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: "v${{ needs.detect-version.outputs.version }}"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build distribution
        run: |
          pip install build --quiet
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  # ── Step 4: Wait for PyPI ─────────────────────────────────────────────────
  wait-pypi:
    name: Wait for PyPI squish-ai==${{ needs.tag.outputs.version }}
    needs: [tag, publish-pypi]
    runs-on: ubuntu-latest
    outputs:
      version: ${{ needs.tag.outputs.version }}
      sha256: ${{ steps.pypi.outputs.sha256 }}
      url: ${{ steps.pypi.outputs.url }}
    steps:
      - name: Poll PyPI
        id: pypi
        run: |
          VERSION="${{ needs.tag.outputs.version }}"
          for i in $(seq 1 30); do
            DATA=$(curl -s "https://pypi.org/pypi/squish-ai/${VERSION}/json" | \
                   python3 -c "
          import sys,json
          d=json.loads(sys.stdin.read().encode('utf-8','replace').decode('utf-8'))
          for f in d['urls']:
              if f['packagetype']=='sdist':
                  print(f['digests']['sha256'])
                  print(f['url'])
          " 2>/dev/null || echo "")
            if [ -n "$DATA" ]; then
              SHA256=$(echo "$DATA" | head -1)
              URL=$(echo "$DATA" | tail -1)
              echo "sha256=$SHA256" >> $GITHUB_OUTPUT
              echo "url=$URL"       >> $GITHUB_OUTPUT
              echo "✓ squish-ai==${VERSION} confirmed on PyPI"
              exit 0
            fi
            echo "Waiting for PyPI... attempt $i/30"
            sleep 20
          done
          echo "ERROR: PyPI publish timed out" && exit 1

  # ── Step 5: Build Homebrew bottle ─────────────────────────────────────────
  homebrew-bottle:
    name: Build and publish Homebrew bottle
    needs: wait-pypi
    runs-on: macos-latest
    env:
      VERSION:  ${{ needs.wait-pypi.outputs.version }}
      SHA256:   ${{ needs.wait-pypi.outputs.sha256 }}
      TARBALL:  ${{ needs.wait-pypi.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - name: Update formula — URL and sha256
        run: |
          sed -i '' "s|url \"https://files.pythonhosted.org.*\"|url \"${TARBALL}\"|" \
            Formula/squish.rb
          OLD_SHA=$(grep 'sha256 "[a-f0-9]\{64\}"' Formula/squish.rb | \
                    head -1 | grep -o '"[a-f0-9]*"' | tr -d '"')
          sed -i '' "s/sha256 \"${OLD_SHA}\"/sha256 \"${SHA256}\"/" \
            Formula/squish.rb
          # Remove old bottle block
          python3 -c "
          import re, sys
          path = 'Formula/squish.rb'
          content = open(path).read()
          content = re.sub(r'\n\s*bottle do\n.*?end\n', '\n', content, flags=re.DOTALL)
          open(path, 'w').write(content)
          "
          grep "url\|sha256" Formula/squish.rb | head -3

      - name: Verify formula install method
        run: |
          if grep -q "virtualenv_install_with_resources" Formula/squish.rb; then
            echo "ERROR: Formula still uses virtualenv_install_with_resources"
            echo "This will produce an incomplete bottle without dependencies"
            exit 1
          fi
          echo "✓ Formula uses pip install — deps will be bundled correctly"
          grep -A 8 "def install" Formula/squish.rb

      - name: Stage formula into local tap
        id: tap
        run: |
          # Homebrew now requires formulae to live in a tap — create one locally
          # on the runner and copy the updated formula in before build.
          brew tap-new --no-git konjoai/local
          TAP_DIR=$(brew --repo konjoai/local)
          cp Formula/squish.rb "$TAP_DIR/Formula/squish.rb"
          echo "ref=konjoai/local/squish" >> $GITHUB_OUTPUT

      - name: Verify formula in tap
        run: |
          TAP_DIR=$(brew --repo konjoai/local)
          echo "Formula at: $TAP_DIR/Formula/squish.rb"
          ls -la "$TAP_DIR/Formula/squish.rb"
          brew info konjoai/local/squish | head -5

      - name: Install squish from updated formula
        env:
          # Build-time network access for pip-install-from-PyPI inside the
          # formula. Default is already "allow" but we set it explicitly in
          # case Homebrew's defaults tighten. (HOMEBREW_DISABLE_SANDBOX is
          # not a valid current env var — HOMEBREW_FORMULA_BUILD_NETWORK is.)
          HOMEBREW_FORMULA_BUILD_NETWORK: "allow"
        run: brew install --build-bottle ${{ steps.tap.outputs.ref }}

      - name: Build bottle
        run: |
          brew bottle ${{ steps.tap.outputs.ref }} 2>&1 | tee /tmp/bottle_out.txt
          ls -la squish--*.tar.gz

      - name: Extract bottle metadata
        id: bottle
        run: |
          BOTTLE_FILE=$(ls squish--${VERSION}.arm64_tahoe.bottle*.tar.gz | head -1)
          BOTTLE_SHA=$(grep "arm64_tahoe" /tmp/bottle_out.txt | \
                       grep -o '"[a-f0-9]*"' | tr -d '"')
          REBUILD=$(grep "rebuild" /tmp/bottle_out.txt | \
                    awk '{print $2}' || echo "")
          echo "file=$BOTTLE_FILE"   >> $GITHUB_OUTPUT
          echo "sha=$BOTTLE_SHA"     >> $GITHUB_OUTPUT
          echo "rebuild=$REBUILD"    >> $GITHUB_OUTPUT

      - name: Rename and upload bottle to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ env.VERSION }}"
          REBUILD="${{ steps.bottle.outputs.rebuild }}"
          if [ -n "$REBUILD" ]; then
            SINGLE="squish-${VERSION}.arm64_tahoe.bottle.${REBUILD}.tar.gz"
          else
            SINGLE="squish-${VERSION}.arm64_tahoe.bottle.tar.gz"
          fi
          cp "${{ steps.bottle.outputs.file }}" "$SINGLE"
          gh release upload "v${VERSION}" "$SINGLE" --repo konjoai/squish

      - name: Add bottle block to Formula/squish.rb
        run: |
          VERSION="${{ env.VERSION }}"
          SHA="${{ steps.bottle.outputs.sha }}"
          REBUILD="${{ steps.bottle.outputs.rebuild }}"
          python3 - <<EOF
          import re
          path = 'Formula/squish.rb'
          sha256 = "$SHA"
          rebuild = "$REBUILD"
          version = "$VERSION"
          if rebuild:
              block = f"""
            bottle do
              root_url "https://github.com/konjoai/squish/releases/download/v{version}"
              rebuild {rebuild}
              sha256 cellar: :any_skip_relocation, arm64_tahoe: "{sha256}"
            end"""
          else:
              block = f"""
            bottle do
              root_url "https://github.com/konjoai/squish/releases/download/v{version}"
              sha256 cellar: :any_skip_relocation, arm64_tahoe: "{sha256}"
            end"""
          content = open(path).read()
          content = re.sub(
              r'(  sha256 "[a-f0-9]{64}")',
              r'\1' + block,
              content, count=1
          )
          open(path, 'w').write(content)
          EOF

      - name: Commit and push formula to konjoai/squish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/squish.rb
          git commit -m "release: squish-ai ${{ env.VERSION }} formula + bottle"
          git push

      - name: Update konjoai/homebrew-squish
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/konjoai/homebrew-squish.git" /tmp/tap
          cp Formula/squish.rb /tmp/tap/Formula/squish.rb
          cd /tmp/tap
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/squish.rb
          git commit -m "release: squish-ai ${{ env.VERSION }} formula + bottle"
          git push

      - name: Final validation
        run: |
          brew uninstall squish 2>/dev/null || true
          brew install squish
          squish --version
          squish doctor
