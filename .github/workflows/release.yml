# Required secrets:
#   HOMEBREW_TAP_TOKEN — GitHub Personal Access Token with repo scope for both
#   konjoai/squish and konjoai/homebrew-squish. Create at:
#   https://github.com/settings/tokens and add to:
#   https://github.com/konjoai/squish/settings/secrets/actions
#
# GITHUB_TOKEN is provided automatically by GitHub Actions (no setup needed).

name: Release

on:
  push:
    branches: [main]

  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 9.33.5) — leave blank to auto-detect from pyproject.toml"
        required: false
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  # ── Step 1: Detect or accept version ──────────────────────────────────────
  detect-version:
    name: Detect version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      should_release: ${{ steps.ver.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Resolve version
        id: ver
        run: |
          # Manual dispatch with explicit version
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "should_release=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Auto-detect from pyproject.toml diff
          NEW=$(grep '^version' pyproject.toml | head -1 | sed 's/version = "//;s/"//')
          OLD=$(git show HEAD~1:pyproject.toml 2>/dev/null | \
                grep '^version' | head -1 | sed 's/version = "//;s/"//' || echo "")
          echo "version=$NEW" >> $GITHUB_OUTPUT
          if [ "$NEW" != "$OLD" ] && [ -n "$OLD" ]; then
            echo "should_release=true" >> $GITHUB_OUTPUT
          else
            echo "should_release=false" >> $GITHUB_OUTPUT
          fi

  # ── Step 2: Tag ───────────────────────────────────────────────────────────
  tag:
    name: Create git tag
    needs: detect-version
    if: needs.detect-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ needs.detect-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Tag and push
        run: |
          VERSION="${{ needs.detect-version.outputs.version }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Skip if tag already exists (idempotent)
          if git ls-remote --tags origin | grep -q "refs/tags/v${VERSION}$"; then
            echo "Tag v${VERSION} already exists — skipping"
          else
            git tag "v${VERSION}"
            git push origin "v${VERSION}"
            echo "✓ Tagged v${VERSION} — publish.yml and build-squishbar.yml now firing"
          fi

  # ── Step 3: Publish to PyPI ───────────────────────────────────────────────
  publish-pypi:
    name: Publish squish-ai to PyPI
    needs: [detect-version, tag]
    if: needs.detect-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: "v${{ needs.detect-version.outputs.version }}"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build distribution
        run: |
          pip install build --quiet
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip_existing: true

  # ── Step 4: Wait for PyPI ─────────────────────────────────────────────────
  wait-pypi:
    name: Wait for PyPI squish-ai==${{ needs.tag.outputs.version }}
    needs: [tag]
    runs-on: ubuntu-latest
    outputs:
      version: ${{ needs.tag.outputs.version }}
      sha256: ${{ steps.pypi.outputs.sha256 }}
      url: ${{ steps.pypi.outputs.url }}
      wheel_sha256: ${{ steps.pypi.outputs.wheel_sha256 }}
      wheel_url: ${{ steps.pypi.outputs.wheel_url }}
    steps:
      - name: Poll PyPI
        id: pypi
        run: |
          VERSION="${{ needs.tag.outputs.version }}"
          for i in $(seq 1 30); do
            # The Homebrew formula installs squish-ai from the WHEEL resource, so
            # we must capture both sdist and wheel — bumping only the sdist
            # (headline url) leaves the resource stale and brew installs the
            # previous version. Python emits ready-to-append key=value lines.
            DATA=$(curl -s "https://pypi.org/pypi/squish-ai/${VERSION}/json" | \
                   python3 -c "
          import sys,json
          try:
              d=json.loads(sys.stdin.read().encode('utf-8','replace').decode('utf-8'))
          except Exception:
              sys.exit(0)
          sd=wh=None
          for f in d.get('urls',[]):
              if f['packagetype']=='sdist':       sd=f
              elif f['packagetype']=='bdist_wheel': wh=f
          if sd and wh:
              print('sha256='       + sd['digests']['sha256'])
              print('url='          + sd['url'])
              print('wheel_sha256=' + wh['digests']['sha256'])
              print('wheel_url='    + wh['url'])
              print('READY=1')
          " 2>/dev/null || echo "")
            if echo "$DATA" | grep -q '^READY=1$'; then
              echo "$DATA" | grep -vE '^READY=1$' >> $GITHUB_OUTPUT
              echo "✓ squish-ai==${VERSION} sdist+wheel confirmed on PyPI"
              exit 0
            fi
            echo "Waiting for PyPI (sdist+wheel)... attempt $i/30"
            sleep 20
          done
          echo "ERROR: PyPI publish timed out (sdist+wheel not both present)" && exit 1

  # ── Step 5: Update Homebrew formula (source-install, no bottle) ──────────
  update-formula:
    name: Update Homebrew formula
    needs: wait-pypi
    runs-on: ubuntu-latest
    env:
      VERSION:      ${{ needs.wait-pypi.outputs.version }}
      SHA256:       ${{ needs.wait-pypi.outputs.sha256 }}
      TARBALL:      ${{ needs.wait-pypi.outputs.url }}
      WHEEL_SHA256: ${{ needs.wait-pypi.outputs.wheel_sha256 }}
      WHEEL_URL:    ${{ needs.wait-pypi.outputs.wheel_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Update formula URL, sha256, and squish_ai resource
        run: |
          python3 - << 'EOF'
          import re, os
          url        = os.environ["TARBALL"]
          sha        = os.environ["SHA256"]
          wheel_url  = os.environ["WHEEL_URL"]
          wheel_sha  = os.environ["WHEEL_SHA256"]
          ver        = os.environ["VERSION"]

          def bump_resource(text, name, r_url, r_sha):
              """Rewrite the url + sha256 inside `resource "<name>" do ... end`.

              The formula installs squish-ai from this wheel resource (not the
              headline sdist url), so it MUST track the release version or brew
              silently installs the previous one.
              """
              pat = re.compile(
                  r'(resource "' + re.escape(name) + r'" do\n)(.*?)(\n  end)',
                  re.DOTALL,
              )
              def repl(m):
                  body = re.sub(r'url "[^"]*"', f'url "{r_url}"', m.group(2), count=1)
                  body = re.sub(r'sha256 "[a-f0-9]{64}"',
                                f'sha256 "{r_sha}"', body, count=1)
                  return m.group(1) + body + m.group(3)
              new, n = pat.subn(repl, text, count=1)
              if n != 1:
                  raise SystemExit(f"ERROR: resource \"{name}\" block not found — "
                                   "formula structure changed, refusing to push a "
                                   "half-updated formula")
              return new

          for path in ["Formula/squish.rb"]:
              c = open(path).read()
              # Headline sdist url + sha256 (2-space indent distinguishes it from
              # the 4-space-indented resource shas).
              c = re.sub(r'url "[^"]*"', f'url "{url}"', c, count=1)
              c = re.sub(r'(^  sha256 ")[a-f0-9]{64}(")',
                         f'\\g<1>{sha}\\g<2>', c, flags=re.MULTILINE, count=1)
              # The package itself — installed from this wheel resource.
              c = bump_resource(c, "squish_ai", wheel_url, wheel_sha)
              # Keep the "valid for squish-ai X.Y.Z" comment honest.
              c = re.sub(r'(Resource blocks valid for squish-ai )\d+\.\d+\.\d+',
                         f'\\g<1>{ver}', c, count=1)
              # Remove any stale bottle block
              c = re.sub(r'\n\s*bottle do\n.*?end\n', '\n',
                         c, flags=re.DOTALL)
              open(path, "w").write(c)
              print(f"Updated {path}")
          EOF
          echo "── headline + squish_ai resource after bump ──"
          grep -nE 'squish_ai-|^  url|^  sha256|resource "squish_ai"' Formula/squish.rb | head -8

      - name: Commit formula to konjoai/squish
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/squish.rb
          git commit -m "release: squish-ai ${{ env.VERSION }} formula update" \
            || echo "No changes to commit"
          git push

      - name: Update konjoai/homebrew-squish
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git clone \
            "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/konjoai/homebrew-squish.git" \
            /tmp/tap
          cp Formula/squish.rb /tmp/tap/Formula/squish.rb
          cd /tmp/tap
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/squish.rb
          git commit -m "release: squish-ai ${{ env.VERSION }} formula update" \
            || echo "No changes to commit"
          git push
