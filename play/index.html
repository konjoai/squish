<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black"/>
<meta name="theme-color" content="#0a0a1a"/>
<title>Squish World 🌟</title>
<style>
/* game.css — Squish World */
*, *::before, *::after { box-sizing: border-box; }

html, body {
  margin: 0; padding: 0;
  width: 100%; height: 100%;
  overflow: hidden;
  background: #0a0a1a;
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
  overscroll-behavior: none;
}

#game {
  display: block;
  width: 100vw;
  height: 100vh;
  cursor: pointer;
  touch-action: none;
}

/* Loading splash (before JS kicks in) */
#splash {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: #0a0a1a;
  z-index: 10;
  transition: opacity 0.5s;
}
#splash.hidden { opacity: 0; pointer-events: none; }
#splash .logo {
  width: 96px; height: 96px;
  background: linear-gradient(135deg, #7c3aed, #a855f7);
  border-radius: 28px;
  box-shadow: 0 0 48px rgba(124,58,237,0.5);
  animation: splashPulse 1.5s ease-in-out infinite;
}
#splash p {
  color: rgba(255,255,255,0.6);
  font-family: system-ui, sans-serif;
  font-size: 18px;
  margin-top: 24px;
  letter-spacing: 0.1em;
}

@keyframes splashPulse {
  0%, 100% { transform: scale(1);    box-shadow: 0 0 48px rgba(124,58,237,0.5); }
  50%       { transform: scale(1.08); box-shadow: 0 0 72px rgba(168,85,247,0.7); }
}

</style>
</head>
<body>
<div id="splash"><div class="logo"></div><p>Loading Squish World…</p></div>
<canvas id="game" aria-label="Squish World — a magical game for Lily"></canvas>
<script>
/* Squish World — single-file inlined build. No external deps at runtime. */
(function(){
  if(typeof CanvasRenderingContext2D==='undefined')return;
  if(CanvasRenderingContext2D.prototype.roundRect)return;
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    if(typeof r==='number')r=[r,r,r,r];
    else if(!Array.isArray(r))r=[0,0,0,0];
    while(r.length<4)r.push(r[r.length-1]);
    this.moveTo(x+r[0],y);this.lineTo(x+w-r[1],y);
    this.quadraticCurveTo(x+w,y,x+w,y+r[1]);
    this.lineTo(x+w,y+h-r[2]);
    this.quadraticCurveTo(x+w,y+h,x+w-r[2],y+h);
    this.lineTo(x+r[3],y+h);
    this.quadraticCurveTo(x,y+h,x,y+h-r[3]);
    this.lineTo(x,y+r[0]);
    this.quadraticCurveTo(x,y,x+r[0],y);
    this.closePath();
  };
})();

// ── js/audio.js ──
/** audio.js — Web Audio API engine. All tones are procedural; no audio files. */

let _ctx = null;
let _masterGain = null;

/** Must be called on first user gesture to comply with browser autoplay policy. */
function initAudio() {
  if (_ctx) return;
  _ctx = new (window.AudioContext || window.webkitAudioContext)();
  _masterGain = _ctx.createGain();
  _masterGain.gain.value = 0.35;
  _masterGain.connect(_ctx.destination);
}

function resumeAudio() {
  if (_ctx && _ctx.state === 'suspended') _ctx.resume();
}

function note(freq, type, duration, attack, decay, volume = 1) {
  if (!_ctx) return;
  const t = _ctx.currentTime;
  const osc = _ctx.createOscillator();
  const gain = _ctx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(0, t);
  gain.gain.linearRampToValueAtTime(volume, t + attack);
  gain.gain.exponentialRampToValueAtTime(0.001, t + attack + decay);
  osc.connect(gain);
  gain.connect(_masterGain);
  osc.start(t);
  osc.stop(t + attack + decay + 0.05);
}

// Pentatonic scale C4 D4 E4 G4 A4
const PENTA = [261.63, 293.66, 329.63, 392.00, 440.00];

function playNote(freq) { note(freq, 'sine', 0.4, 0.01, 0.4); }

function playPop(pitch = 1) {
  if (!_ctx) return;
  const t = _ctx.currentTime;
  const osc = _ctx.createOscillator();
  const gain = _ctx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(800 * pitch, t);
  osc.frequency.exponentialRampToValueAtTime(200 * pitch, t + 0.12);
  gain.gain.setValueAtTime(0.5, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
  osc.connect(gain);
  gain.connect(_masterGain);
  osc.start(t);
  osc.stop(t + 0.2);
}

function playSuccess() {
  if (!_ctx) return;
  [261.63, 329.63, 392.00].forEach((f, i) => {
    const t = _ctx.currentTime + i * 0.12;
    const osc = _ctx.createOscillator();
    const gain = _ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = f;
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.4, t + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
    osc.connect(gain);
    gain.connect(_masterGain);
    osc.start(t);
    osc.stop(t + 0.5);
  });
}

function playWobble() {
  if (!_ctx) return;
  const t = _ctx.currentTime;
  const osc = _ctx.createOscillator();
  const gain = _ctx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(300, t);
  osc.frequency.linearRampToValueAtTime(250, t + 0.15);
  osc.frequency.linearRampToValueAtTime(280, t + 0.3);
  gain.gain.setValueAtTime(0.25, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
  osc.connect(gain);
  gain.connect(_masterGain);
  osc.start(t);
  osc.stop(t + 0.4);
}

function playChime(noteIndex = 0) {
  playNote(PENTA[noteIndex % PENTA.length]);
}

function playSplash() {
  if (!_ctx) return;
  const t = _ctx.currentTime;
  for (let i = 0; i < 4; i++) {
    const osc = _ctx.createOscillator();
    const gain = _ctx.createGain();
    osc.type = 'triangle';
    osc.frequency.value = 200 + Math.random() * 600;
    gain.gain.setValueAtTime(0.15, t + i * 0.03);
    gain.gain.exponentialRampToValueAtTime(0.001, t + i * 0.03 + 0.25);
    osc.connect(gain);
    gain.connect(_masterGain);
    osc.start(t + i * 0.03);
    osc.stop(t + i * 0.03 + 0.3);
  }
}

function playBounce() {
  if (!_ctx) return;
  const t = _ctx.currentTime;
  const osc = _ctx.createOscillator();
  const gain = _ctx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(400, t);
  osc.frequency.exponentialRampToValueAtTime(150, t + 0.25);
  gain.gain.setValueAtTime(0.3, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
  osc.connect(gain);
  gain.connect(_masterGain);
  osc.start(t);
  osc.stop(t + 0.35);
}

function playGiggle() {
  if (!_ctx) return;
  const freqs = [500, 600, 550, 650, 600];
  freqs.forEach((f, i) => {
    const t = _ctx.currentTime + i * 0.07;
    const osc = _ctx.createOscillator();
    const gain = _ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = f;
    gain.gain.setValueAtTime(0.2, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
    osc.connect(gain);
    gain.connect(_masterGain);
    osc.start(t);
    osc.stop(t + 0.1);
  });
}

function playFirefly() {
  if (!_ctx) return;
  const t = _ctx.currentTime;
  const osc = _ctx.createOscillator();
  const gain = _ctx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(880, t);
  osc.frequency.linearRampToValueAtTime(1100, t + 0.2);
  gain.gain.setValueAtTime(0, t);
  gain.gain.linearRampToValueAtTime(0.18, t + 0.05);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
  osc.connect(gain);
  gain.connect(_masterGain);
  osc.start(t);
  osc.stop(t + 0.45);
}

function playMagic() {
  if (!_ctx) return;
  const t = _ctx.currentTime;
  [700, 900, 1100].forEach((f, i) => {
    const osc = _ctx.createOscillator();
    const gain = _ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = f + Math.random() * 100;
    gain.gain.setValueAtTime(0.12, t + i * 0.04);
    gain.gain.exponentialRampToValueAtTime(0.001, t + i * 0.04 + 0.2);
    osc.connect(gain);
    gain.connect(_masterGain);
    osc.start(t + i * 0.04);
    osc.stop(t + i * 0.04 + 0.25);
  });
}

// ── js/speech.js ──
/** speech.js — Web Speech API wrapper. Gracefully silent if unavailable. */

let _voice = null;
let _available = false;

function initSpeech() {
  if (!window.speechSynthesis) return;
  _available = true;

  function pickVoice() {
    const voices = speechSynthesis.getVoices();
    // Prefer warm female English voices
    const preferred = voices.find(v =>
      v.lang.startsWith('en') && (
        v.name.includes('Samantha') || v.name.includes('Karen') ||
        v.name.includes('Moira') || v.name.includes('Tessa') ||
        v.name.includes('Vicki') || (v.gender && v.gender === 'female')
      )
    );
    _voice = preferred || voices.find(v => v.lang.startsWith('en')) || null;
  }

  pickVoice();
  if (speechSynthesis.onvoiceschanged !== undefined) {
    speechSynthesis.onvoiceschanged = pickVoice;
  }
}

function say(text, { rate = 0.88, pitch = 1.15, volume = 1 } = {}) {
  if (!_available || !window.speechSynthesis) return;
  try {
    speechSynthesis.cancel();
    const utt = new SpeechSynthesisUtterance(text);
    if (_voice) utt.voice = _voice;
    utt.rate = rate;
    utt.pitch = pitch;
    utt.volume = volume;
    utt.lang = 'en-US';
    speechSynthesis.speak(utt);
  } catch (_) {
    // silent fallback
  }
}

// Squish companion phrases
const SQUISH_IDLE = [
  "Let's play!",
  "Hi Lily!",
  "You're doing great!",
  "I love you!",
  "What shall we do?",
  "You're so clever!",
];

const SQUISH_SUCCESS = [
  "Yay! You did it!",
  "Amazing!",
  "Wonderful!",
  "So good!",
  "You're a star!",
  "Hooray!",
];

const SQUISH_EXPLORE = [
  "Want to try something new?",
  "Let's explore more!",
  "Come see what's inside!",
];

const ANIMAL_NAMES = {
  duck: "Quack quack! Duck!",
  bunny: "Hop hop! Bunny!",
  cat: "Meow! Kitty cat!",
  dog: "Woof! Puppy dog!",
  frog: "Ribbit! Froggy!",
  bear: "Rawr! Bear!",
};

function sayRandom(arr) {
  say(arr[Math.floor(Math.random() * arr.length)]);
}

// ── js/save.js ──
/** save.js — localStorage persistence with graceful fallback. */

const KEY = 'squishworld_save';
const AVATAR_KEY = 'squishworld_avatar';

const defaultSave = () => ({
  stage_unlocked: 0,
  activities_completed: {},
  time_in_stage0: 0,
  avatar_config: null,
  journal: [],
  first_launch: Date.now(),
});

let _save = null;

function loadSave() {
  try {
    const raw = localStorage.getItem(KEY);
    _save = raw ? { ...defaultSave(), ...JSON.parse(raw) } : defaultSave();
  } catch (_) {
    _save = defaultSave();
  }
  return _save;
}

function getSave() {
  if (!_save) return loadSave();
  return _save;
}

function writeSave(partial) {
  _save = { ..._save, ...partial };
  try { localStorage.setItem(KEY, JSON.stringify(_save)); } catch (_) {}
}

function addJournalEntry(event) {
  const s = getSave();
  const entry = { date: new Date().toISOString(), event };
  s.journal = [entry, ...(s.journal || [])].slice(0, 100);
  writeSave({ journal: s.journal });
}

function markActivityComplete(id) {
  const s = getSave();
  if (!s.activities_completed[id]) {
    s.activities_completed[id] = Date.now();
    addJournalEntry(`Completed ${id}`);
    writeSave({ activities_completed: s.activities_completed });
  }
}

function addStage0Time(seconds) {
  const s = getSave();
  writeSave({ time_in_stage0: (s.time_in_stage0 || 0) + seconds });
}

function unlockStage1() {
  const s = getSave();
  if (s.stage_unlocked < 1) {
    addJournalEntry('Unlocked Stage 1 — Intention!');
    writeSave({ stage_unlocked: 1 });
  }
}

// Avatar
function loadAvatar() {
  try {
    const raw = localStorage.getItem(AVATAR_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch (_) { return null; }
}

function saveAvatar(config) {
  try { localStorage.setItem(AVATAR_KEY, JSON.stringify(config)); } catch (_) {}
}

// ── js/particles.js ──
/** particles.js — Shared particle system for tap bursts, confetti, etc. */

const particles = [];

const RAINBOW = ['#f43f5e','#f59e0b','#22c55e','#3b82f6','#a855f7','#14b8a6','#f97316','#ec4899'];

function burst(x, y, count = 12, colors = RAINBOW, speed = 5) {
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 * i) / count + Math.random() * 0.4;
    const s = speed * (0.6 + Math.random() * 0.8);
    particles.push({
      x, y,
      vx: Math.cos(angle) * s,
      vy: Math.sin(angle) * s - 2,
      r: 4 + Math.random() * 6,
      color: colors[i % colors.length],
      alpha: 1,
      gravity: 0.18,
      life: 1,
      decay: 0.025 + Math.random() * 0.02,
    });
  }
}

function sparkle(x, y, color = '#f59e0b', count = 8) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const s = 2 + Math.random() * 4;
    particles.push({
      x: x + Math.random() * 20 - 10,
      y: y + Math.random() * 20 - 10,
      vx: Math.cos(angle) * s,
      vy: Math.sin(angle) * s,
      r: 2 + Math.random() * 3,
      color,
      alpha: 1,
      gravity: 0.05,
      life: 1,
      decay: 0.03 + Math.random() * 0.03,
      star: true,
    });
  }
}

function confetti(cx, cy, count = 40) {
  const colors = RAINBOW;
  for (let i = 0; i < count; i++) {
    particles.push({
      x: cx + Math.random() * 200 - 100,
      y: cy,
      vx: (Math.random() - 0.5) * 8,
      vy: -8 - Math.random() * 8,
      r: 5 + Math.random() * 5,
      ry: 1,
      rvy: 0.2 + Math.random() * 0.3,
      color: colors[i % colors.length],
      alpha: 1,
      gravity: 0.3,
      life: 1,
      decay: 0.012,
      rect: true,
      w: 6 + Math.random() * 8,
      h: 4 + Math.random() * 4,
      rot: Math.random() * Math.PI * 2,
    });
  }
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += p.gravity;
    p.vx *= 0.97;
    p.life -= p.decay;
    p.alpha = Math.max(0, p.life);
    if (p.rot !== undefined) p.rot += p.rvy || 0.1;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles(ctx) {
  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha = p.alpha;
    ctx.fillStyle = p.color;
    if (p.rect) {
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot || 0);
      ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
    } else if (p.star) {
      ctx.translate(p.x, p.y);
      drawStar(ctx, 0, 0, p.r * 0.5, p.r, 4);
    } else {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }
}

function drawStar(ctx, cx, cy, r1, r2, n) {
  ctx.beginPath();
  for (let i = 0; i < n * 2; i++) {
    const angle = (Math.PI / n) * i - Math.PI / 2;
    const r = i % 2 === 0 ? r2 : r1;
    if (i === 0) ctx.moveTo(cx + r * Math.cos(angle), cy + r * Math.sin(angle));
    else ctx.lineTo(cx + r * Math.cos(angle), cy + r * Math.sin(angle));
  }
  ctx.closePath();
  ctx.fill();
}

// ── js/squish.js ──
/** squish.js — Squish companion character. Always present. */

class Squish {
  constructor(canvasW, canvasH) {
    this.W = canvasW;
    this.H = canvasH;
    this.size = Math.min(canvasW, canvasH) * 0.12;
    // Floating in bottom-right corner
    this.baseX = canvasW - this.size - 20;
    this.baseY = canvasH - this.size - 20;
    this.x = this.baseX;
    this.y = this.baseY;
    this.t = 0;
    this.scale = 1;
    this.rotation = 0;
    this.color = '#7c3aed';
    this.colors = ['#7c3aed','#f43f5e','#f59e0b','#14b8a6','#22c55e','#3b82f6'];
    this.colorIndex = 0;
    this.bounceVy = 0;
    this.bounceY = 0;
    this.state = 'idle'; // idle | bounce | spin | shimmer
    this.stateTimer = 0;
    this.idleTimer = 0;
    this.idleInterval = 8 + Math.random() * 7; // seconds between idle phrases
    this.tapCount = 0;
  }

  resize(w, h) {
    this.W = w; this.H = h;
    this.size = Math.min(w, h) * 0.12;
    this.baseX = w - this.size - 20;
    this.baseY = h - this.size - 20;
    this.x = this.baseX;
    this.y = this.baseY;
  }

  update(dt) {
    this.t += dt;
    this.idleTimer += dt;

    // Idle bob
    const bob = Math.sin(this.t * 2.2) * 6;

    // State machine
    switch (this.state) {
      case 'idle':
        this.bounceY += (bob - this.bounceY) * 0.1;
        this.scale += (1 - this.scale) * 0.1;
        this.rotation += (0 - this.rotation) * 0.1;
        if (this.idleTimer > this.idleInterval) {
          this.idleTimer = 0;
          this.idleInterval = 8 + Math.random() * 7;
          sayRandom(SQUISH_IDLE);
        }
        break;
      case 'bounce':
        this.bounceVy += 0.8;
        this.bounceY += this.bounceVy;
        this.scale = 1 + Math.sin(this.stateTimer * 15) * 0.12;
        if (this.bounceY > 0) {
          this.bounceY = 0;
          this.bounceVy = -this.bounceVy * 0.55;
          if (Math.abs(this.bounceVy) < 1) this.state = 'idle';
        }
        this.stateTimer += dt;
        break;
      case 'spin':
        this.rotation += 6 * dt;
        this.stateTimer += dt;
        this.scale = 1 + Math.sin(this.stateTimer * 8) * 0.08;
        if (this.stateTimer > 1.2) {
          this.state = 'idle';
          this.rotation = 0;
        }
        break;
      case 'shimmer':
        this.scale = 1 + Math.sin(this.stateTimer * 12) * 0.06;
        this.stateTimer += dt;
        if (this.stateTimer > 0.8) this.state = 'idle';
        break;
    }

    this.y = this.baseY + this.bounceY;
    this.x = this.baseX + Math.sin(this.t * 1.1) * 4;
  }

  draw(ctx) {
    ctx.save();
    ctx.translate(this.x + this.size / 2, this.y + this.size / 2);
    ctx.rotate(this.rotation);
    ctx.scale(this.scale, this.scale);

    const s = this.size;
    const r = s * 0.22;

    // Glow
    const glow = ctx.createRadialGradient(0, 0, s * 0.2, 0, 0, s * 0.7);
    glow.addColorStop(0, this.color + '60');
    glow.addColorStop(1, this.color + '00');
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(0, 0, s * 0.7, 0, Math.PI * 2);
    ctx.fill();

    // Body (rounded cube face)
    ctx.beginPath();
    const hs = s / 2;
    ctx.roundRect(-hs, -hs, s, s, r);
    const bodyGrad = ctx.createLinearGradient(-hs, -hs, hs, hs);
    bodyGrad.addColorStop(0, lighten(this.color, 30));
    bodyGrad.addColorStop(1, this.color);
    ctx.fillStyle = bodyGrad;
    ctx.shadowColor = this.color;
    ctx.shadowBlur = 18;
    ctx.fill();
    ctx.shadowBlur = 0;

    // Eyes
    const eyeY = -s * 0.08;
    const eyeR = s * 0.1;
    const eyeX = s * 0.16;
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(-eyeX, eyeY, eyeR, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(eyeX,  eyeY, eyeR, 0, Math.PI * 2); ctx.fill();

    // Pupils with happy squint during bounce
    const pupilR = eyeR * 0.55;
    const squint = this.state === 'bounce' ? 0.3 : 0;
    ctx.fillStyle = '#1a0a3e';
    if (squint > 0) {
      // Happy squint eyes
      ctx.beginPath();
      ctx.arc(-eyeX, eyeY + squint * eyeR, pupilR, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath();
      ctx.arc(eyeX, eyeY + squint * eyeR, pupilR, 0, Math.PI * 2); ctx.fill();
    } else {
      ctx.beginPath(); ctx.arc(-eyeX, eyeY, pupilR, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(eyeX, eyeY, pupilR, 0, Math.PI * 2); ctx.fill();
    }

    // Smile
    const smileY = s * 0.15;
    ctx.beginPath();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = s * 0.05;
    ctx.lineCap = 'round';
    ctx.arc(0, smileY, s * 0.2, 0.2, Math.PI - 0.2);
    ctx.stroke();

    // Shimmer stars during shimmer state
    if (this.state === 'shimmer') {
      ctx.fillStyle = '#f59e0b';
      for (let i = 0; i < 4; i++) {
        const a = (i / 4) * Math.PI * 2 + this.t * 3;
        const sr = s * 0.55;
        ctx.beginPath();
        ctx.arc(Math.cos(a) * sr, Math.sin(a) * sr, 3, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    ctx.restore();
  }

  hit(px, py) {
    const cx = this.x + this.size / 2;
    const cy = this.y + this.size / 2;
    const r = this.size * 0.6;
    return Math.hypot(px - cx, py - cy) < r;
  }

  onTap() {
    this.tapCount++;
    playBounce();
    if (this.tapCount % 3 === 0) playGiggle();
    this.state = this.tapCount % 4 === 0 ? 'spin' : 'bounce';
    this.stateTimer = 0;
    this.bounceVy = -12;
    // Cycle color every 3 taps
    if (this.tapCount % 3 === 0) {
      this.colorIndex = (this.colorIndex + 1) % this.colors.length;
      this.color = this.colors[this.colorIndex];
    }
    sparkle(this.x + this.size / 2, this.y + this.size / 2, this.color);
    burst(this.x + this.size / 2, this.y, 8, [this.color]);
    const phrases = ['Hee hee!', 'Wheee!', 'Again again!', 'Woo hoo!', ''];
    say(phrases[this.tapCount % phrases.length]);
  }

  celebrate() {
    this.state = 'spin';
    this.stateTimer = 0;
    burst(this.x + this.size / 2, this.y, 16);
    sayRandom(SQUISH_SUCCESS);
  }

  shimmer() {
    this.state = 'shimmer';
    this.stateTimer = 0;
  }
}

function lighten(hex, amount) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  const lr = Math.min(255, r + amount);
  const lg = Math.min(255, g + amount);
  const lb = Math.min(255, b + amount);
  return `#${lr.toString(16).padStart(2,'0')}${lg.toString(16).padStart(2,'0')}${lb.toString(16).padStart(2,'0')}`;
}

// ── js/avatar.js ──
/** avatar.js — Avatar creator scene + avatar renderer. */

const HAIR_COLORS = ['#f59e0b','#a16207','#dc2626','#1d4ed8','#7c3aed'];
const SKIN_TONES  = ['#fde68a','#fbbf24','#d97706','#92400e','#7c3cd3','#f87171'];
const OUTFIT_COLORS = ['#7c3aed','#f43f5e','#14b8a6','#f59e0b','#22c55e'];

const HAIR_ICONS = ['curly','wavy','straight','braids','buns'];
const OUTFIT_ICONS = ['stars','hearts','stripes','dots','rainbows'];

class AvatarCreatorScene {
  constructor(canvas, onDone) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.onDone = onDone;
    this.config = {
      hairColor: HAIR_COLORS[0],
      skinTone: SKIN_TONES[2],
      outfitColor: OUTFIT_COLORS[0],
      hairStyle: 0,
      outfitStyle: 0,
    };
    this.t = 0;
    this.doneBtn = null;
    this.swatches = [];
    this._buildUI();
    say("Hi! Let's make your character! Pick your favorite colors!");
  }

  _buildUI() {
    const { width: W, height: H } = this.canvas;
    const sw = 44, gap = 10;
    this.swatches = [];

    const row = (colors, y, type) =>
      colors.map((c, i) => ({
        x: W / 2 - (colors.length * (sw + gap)) / 2 + i * (sw + gap) + sw / 2,
        y, r: sw / 2, color: c, type,
      }));

    const sectionY = H * 0.55;
    this.swatches = [
      ...row(HAIR_COLORS, sectionY, 'hair'),
      ...row(SKIN_TONES, sectionY + sw + gap * 2, 'skin'),
      ...row(OUTFIT_COLORS, sectionY + (sw + gap * 2) * 2, 'outfit'),
    ];

    this.doneBtn = {
      x: W / 2, y: H * 0.92,
      w: 180, h: 56,
      label: "Let's go! ✨",
    };
  }

  resize() {
    this._buildUI();
  }

  update(dt) { this.t += dt; }

  draw() {
    const { ctx, canvas } = this;
    const { width: W, height: H } = canvas;
    ctx.clearRect(0, 0, W, H);

    // Background gradient
    const bg = ctx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, '#0a0a2e');
    bg.addColorStop(1, '#1a0a3e');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);

    // Stars
    for (let i = 0; i < 40; i++) {
      const sx = ((i * 137.5) % W);
      const sy = ((i * 73.1) % (H * 0.45));
      const sr = 1 + (i % 3);
      const alpha = 0.4 + 0.4 * Math.sin(this.t * 2 + i);
      ctx.fillStyle = `rgba(255,255,255,${alpha})`;
      ctx.beginPath();
      ctx.arc(sx, sy, sr, 0, Math.PI * 2);
      ctx.fill();
    }

    // Title
    ctx.fillStyle = '#f59e0b';
    ctx.font = `bold ${Math.min(W, H) * 0.07}px system-ui, sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText("Make your character!", W / 2, H * 0.09);

    // Avatar preview
    drawAvatar(ctx, W / 2, H * 0.32, Math.min(W, H) * 0.22, this.config);

    // Section labels
    const labelFont = `bold ${Math.min(W, H) * 0.038}px system-ui`;
    ctx.font = labelFont;
    ctx.fillStyle = '#fff';
    const sw = 44, gap = 10;
    const sectionY = H * 0.55;
    ctx.textAlign = 'center';
    ctx.fillText("Hair", W / 2, sectionY - 8);
    ctx.fillText("Skin", W / 2, sectionY + sw + gap * 2 - 8);
    ctx.fillText("Outfit", W / 2, sectionY + (sw + gap * 2) * 2 - 8);

    // Swatches
    for (const s of this.swatches) {
      const active = this._isActive(s);
      ctx.save();
      if (active) {
        ctx.shadowColor = s.color;
        ctx.shadowBlur = 14;
        ctx.scale(1.15, 1.15);
        ctx.translate(s.x * (1 - 1 / 1.15), s.y * (1 - 1 / 1.15));
      }
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = s.color;
      ctx.fill();
      if (active) {
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 3;
        ctx.stroke();
      }
      ctx.restore();
    }

    // Done button
    const btn = this.doneBtn;
    ctx.save();
    const pulse = 1 + Math.sin(this.t * 3) * 0.03;
    ctx.translate(btn.x, btn.y);
    ctx.scale(pulse, pulse);
    ctx.beginPath();
    ctx.roundRect(-btn.w / 2, -btn.h / 2, btn.w, btn.h, 28);
    const btnGrad = ctx.createLinearGradient(-btn.w / 2, 0, btn.w / 2, 0);
    btnGrad.addColorStop(0, '#7c3aed');
    btnGrad.addColorStop(1, '#a855f7');
    ctx.fillStyle = btnGrad;
    ctx.shadowColor = '#7c3aed';
    ctx.shadowBlur = 20;
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${Math.min(W, H) * 0.046}px system-ui`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(btn.label, 0, 0);
    ctx.restore();
    ctx.textBaseline = 'alphabetic';
  }

  _isActive(s) {
    if (s.type === 'hair')   return this.config.hairColor === s.color;
    if (s.type === 'skin')   return this.config.skinTone === s.color;
    if (s.type === 'outfit') return this.config.outfitColor === s.color;
    return false;
  }

  handleTap(x, y) {
    // Swatches
    for (const s of this.swatches) {
      if (Math.hypot(x - s.x, y - s.y) < s.r + 12) {
        playPop(1.2);
        if (s.type === 'hair')   this.config.hairColor = s.color;
        if (s.type === 'skin')   this.config.skinTone = s.color;
        if (s.type === 'outfit') this.config.outfitColor = s.color;
        burst(x, y, 8, [s.color]);
        return;
      }
    }

    // Done button
    const btn = this.doneBtn;
    if (Math.abs(x - btn.x) < btn.w / 2 + 10 && Math.abs(y - btn.y) < btn.h / 2 + 10) {
      playSuccess();
      say("Let's go! Time to play!");
      burst(x, y, 20);
      saveAvatar(this.config);
      setTimeout(() => this.onDone(this.config), 400);
    }
  }
}

function drawAvatar(ctx, cx, cy, size, cfg = {}) {
  const skin = cfg.skinTone || '#d97706';
  const hair = cfg.hairColor || '#f59e0b';
  const outfit = cfg.outfitColor || '#7c3aed';
  const s = size;

  ctx.save();
  ctx.translate(cx, cy);

  // Body (outfit)
  ctx.beginPath();
  ctx.roundRect(-s * 0.28, -s * 0.08, s * 0.56, s * 0.62, s * 0.12);
  ctx.fillStyle = outfit;
  ctx.fill();

  // Head
  ctx.beginPath();
  ctx.arc(0, -s * 0.22, s * 0.28, 0, Math.PI * 2);
  ctx.fillStyle = skin;
  ctx.fill();

  // Hair
  ctx.beginPath();
  ctx.arc(0, -s * 0.38, s * 0.3, Math.PI, 0);
  ctx.closePath();
  ctx.fillStyle = hair;
  ctx.fill();
  // Hair bun
  ctx.beginPath();
  ctx.arc(0, -s * 0.58, s * 0.12, 0, Math.PI * 2);
  ctx.fillStyle = hair;
  ctx.fill();

  // Eyes
  ctx.fillStyle = '#1a0a3e';
  ctx.beginPath(); ctx.arc(-s * 0.09, -s * 0.2, s * 0.045, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc( s * 0.09, -s * 0.2, s * 0.045, 0, Math.PI * 2); ctx.fill();

  // Eye shine
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-s * 0.075, -s * 0.215, s * 0.018, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc( s * 0.105, -s * 0.215, s * 0.018, 0, Math.PI * 2); ctx.fill();

  // Smile
  ctx.beginPath();
  ctx.arc(0, -s * 0.1, s * 0.1, 0.2, Math.PI - 0.2);
  ctx.strokeStyle = '#7c3c28';
  ctx.lineWidth = s * 0.03;
  ctx.lineCap = 'round';
  ctx.stroke();

  // Arms
  ctx.beginPath();
  ctx.roundRect(-s * 0.46, 0, s * 0.18, s * 0.35, s * 0.09);
  ctx.fillStyle = skin; ctx.fill();
  ctx.beginPath();
  ctx.roundRect( s * 0.28, 0, s * 0.18, s * 0.35, s * 0.09);
  ctx.fillStyle = skin; ctx.fill();

  // Legs
  ctx.beginPath();
  ctx.roundRect(-s * 0.22, s * 0.5, s * 0.18, s * 0.32, s * 0.09);
  ctx.fillStyle = skin; ctx.fill();
  ctx.beginPath();
  ctx.roundRect( s * 0.04, s * 0.5, s * 0.18, s * 0.32, s * 0.09);
  ctx.fillStyle = skin; ctx.fill();

  ctx.restore();
}

/**
 * stage0/activities.js — All 8 Stage 0 delight activities.
 * Each activity exports a class with: constructor(w,h), update(dt), draw(ctx),

// ─────────────────────────────────────────────────────────────────────────────
// 1. BUBBLE POP
// ─────────────────────────────────────────────────────────────────────────────
class BubblePop {
  constructor(w, h) { this.resize(w, h); this.t = 0; this.bubbles = []; }

  resize(w, h) {
    this.W = w; this.H = h;
    this.maxBubbles = Math.floor(w * h / 18000) + 8;
  }

  _spawn() {
    if (this.bubbles.length >= this.maxBubbles) return;
    const r = 24 + Math.random() * 36;
    this.bubbles.push({
      x: r + Math.random() * (this.W - r * 2),
      y: this.H + r,
      r,
      vx: (Math.random() - 0.5) * 0.8,
      vy: -(0.6 + Math.random() * 1.2),
      color: RAINBOW[Math.floor(Math.random() * RAINBOW.length)],
      wobble: Math.random() * Math.PI * 2,
      alpha: 0.85,
      popping: false,
      popT: 0,
    });
  }

  update(dt) {
    this.t += dt;
    if (Math.random() < dt * 3) this._spawn();
    for (let i = this.bubbles.length - 1; i >= 0; i--) {
      const b = this.bubbles[i];
      if (b.popping) {
        b.popT += dt * 5;
        b.r += 4;
        b.alpha -= 0.15;
        if (b.alpha <= 0) this.bubbles.splice(i, 1);
      } else {
        b.wobble += dt * 2;
        b.x += b.vx + Math.sin(b.wobble) * 0.4;
        b.y += b.vy;
        if (b.y < -b.r * 2) this.bubbles.splice(i, 1);
      }
    }
  }

  draw(ctx) {
    for (const b of this.bubbles) {
      ctx.save();
      ctx.globalAlpha = Math.max(0, b.alpha);
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
      ctx.strokeStyle = b.color;
      ctx.lineWidth = 2.5;
      ctx.stroke();
      // Inner shimmer
      const g = ctx.createRadialGradient(b.x - b.r * 0.3, b.y - b.r * 0.3, 1, b.x, b.y, b.r);
      g.addColorStop(0, b.color + '55');
      g.addColorStop(0.7, b.color + '18');
      g.addColorStop(1, b.color + '00');
      ctx.fillStyle = g;
      ctx.fill();
      // Shine
      ctx.beginPath();
      ctx.arc(b.x - b.r * 0.32, b.y - b.r * 0.32, b.r * 0.2, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.55)';
      ctx.fill();
      ctx.restore();
    }
  }

  handleTap(x, y) {
    for (let i = this.bubbles.length - 1; i >= 0; i--) {
      const b = this.bubbles[i];
      if (!b.popping && Math.hypot(x - b.x, y - b.y) < b.r + 12) {
        b.popping = true;
        burst(b.x, b.y, 10, [b.color]);
        playPop(1 + (b.r - 24) / 36 * 0.5);
        return true;
      }
    }
    return false;
  }

  handleDrag(x, y) { this.handleTap(x, y); }
  handleDragEnd() {}
  destroy() {}
}

const ANIMALS = [
  { name:'duck',   color:'#f59e0b', emoji:'🦆', sound:'Quack quack!' },
  { name:'bunny',  color:'#f9a8d4', emoji:'🐰', sound:'Hop hop!' },
  { name:'cat',    color:'#f97316', emoji:'🐱', sound:'Meow!' },
  { name:'dog',    color:'#a78bfa', emoji:'🐶', sound:'Woof woof!' },
  { name:'frog',   color:'#22c55e', emoji:'🐸', sound:'Ribbit!' },
  { name:'bear',   color:'#92400e', emoji:'🐻', sound:'Rawr!' },
];

class AnimalParade {
  constructor(w, h) { this.resize(w, h); this.t = 0; this.critters = []; this._init(); }

  resize(w, h) { this.W = w; this.H = h; }

  _init() {
    this.critters = ANIMALS.map((a, i) => ({
      ...a, x: (i + 1) * this.W / (ANIMALS.length + 1),
      y: this.H * 0.55 + Math.sin(i) * 30,
      baseY: this.H * 0.55 + Math.sin(i) * 30,
      phase: i * 0.8,
      dancing: false, danceT: 0, scale: 1, rot: 0,
      size: Math.min(this.W, this.H) * 0.1,
    }));
  }

  update(dt) {
    this.t += dt;
    for (const c of this.critters) {
      c.y = c.baseY + Math.sin(this.t * 1.8 + c.phase) * 8;
      if (c.dancing) {
        c.danceT += dt;
        c.scale = 1 + Math.sin(c.danceT * 12) * 0.15;
        c.rot = Math.sin(c.danceT * 8) * 0.3;
        if (c.danceT > 1.5) { c.dancing = false; c.scale = 1; c.rot = 0; }
      }
    }
  }

  draw(ctx) {
    for (const c of this.critters) {
      ctx.save();
      ctx.translate(c.x, c.y);
      ctx.rotate(c.rot);
      ctx.scale(c.scale, c.scale);
      // Body circle
      ctx.beginPath();
      ctx.arc(0, 0, c.size * 0.5, 0, Math.PI * 2);
      ctx.fillStyle = c.color;
      ctx.shadowColor = c.color;
      ctx.shadowBlur = 14;
      ctx.fill();
      ctx.shadowBlur = 0;
      // Emoji face
      ctx.font = `${c.size * 0.72}px system-ui`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(c.emoji, 0, 0);
      // Name tag
      ctx.fillStyle = '#fff';
      ctx.font = `bold ${c.size * 0.28}px system-ui`;
      ctx.textBaseline = 'alphabetic';
      ctx.fillText(c.name, 0, c.size * 0.72);
      ctx.restore();
    }
  }

  handleTap(x, y) {
    for (const c of this.critters) {
      if (Math.hypot(x - c.x, y - c.y) < c.size * 0.6) {
        c.dancing = true; c.danceT = 0;
        burst(c.x, c.y - c.size * 0.3, 10, [c.color]);
        playChime(Math.floor(Math.random() * 5));
        say(`${c.sound} ${c.name}!`);
        return true;
      }
    }
    return false;
  }

  handleDrag() {} handleDragEnd() {} destroy() {}
}

// ─────────────────────────────────────────────────────────────────────────────
// 3. MAGIC PAINT
// ─────────────────────────────────────────────────────────────────────────────
class MagicPaint {
  constructor(w, h) {
    this.resize(w, h);
    this.trail = [];
    this.painting = false;
    this.colorI = 0;
    this.colors = ['#7c3aed','#f43f5e','#f59e0b','#14b8a6','#22c55e','#3b82f6'];
    this.lastX = 0; this.lastY = 0;
    this.sparkTimer = 0;
  }

  resize(w, h) { this.W = w; this.H = h; }

  update(dt) {
    this.sparkTimer += dt;
    for (let i = this.trail.length - 1; i >= 0; i--) {
      this.trail[i].life -= dt * 0.25;
      if (this.trail[i].life <= 0) this.trail.splice(i, 1);
    }
  }

  draw(ctx) {
    for (const p of this.trail) {
      ctx.save();
      ctx.globalAlpha = Math.max(0, p.life * 0.8);
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.shadowColor = p.color;
      ctx.shadowBlur = 12;
      ctx.fill();
      ctx.restore();
    }
  }

  handleTap(x, y) {
    this.painting = true;
    this.lastX = x; this.lastY = y;
    this._addDot(x, y);
    playMagic();
  }

  handleDrag(x, y) {
    if (!this.painting) return;
    this._addDot(x, y);
    if (this.sparkTimer > 0.08) {
      sparkle(x, y, this.colors[this.colorI]);
      this.sparkTimer = 0;
    }
    const dist = Math.hypot(x - this.lastX, y - this.lastY);
    if (dist > 10) {
      this.colorI = (this.colorI + 1) % this.colors.length;
    }
    this.lastX = x; this.lastY = y;
  }

  _addDot(x, y) {
    this.trail.push({ x, y, r: 12 + Math.random() * 8, color: this.colors[this.colorI], life: 1 });
  }

  handleDragEnd() { this.painting = false; }
  destroy() {}
}

// ─────────────────────────────────────────────────────────────────────────────
// 4. MUSIC STARS
// ─────────────────────────────────────────────────────────────────────────────
class MusicStars {
  constructor(w, h) { this.resize(w, h); this.t = 0; this.stars = []; this._spawn(12); }

  resize(w, h) { this.W = w; this.H = h; }

  _spawn(n = 1) {
    for (let i = 0; i < n; i++) {
      const noteI = Math.floor(Math.random() * PENTA.length);
      this.stars.push({
        x: 60 + Math.random() * (this.W - 120),
        y: this.H * 0.15 + Math.random() * (this.H * 0.65),
        r: 20 + Math.random() * 20,
        color: RAINBOW[Math.floor(Math.random() * RAINBOW.length)],
        freq: PENTA[noteI],
        noteI,
        phase: Math.random() * Math.PI * 2,
        hit: false, hitT: 0,
        vx: (Math.random() - 0.5) * 0.4,
        vy: (Math.random() - 0.5) * 0.3,
        rot: 0,
        rotV: (Math.random() - 0.5) * 0.02,
      });
    }
  }

  update(dt) {
    this.t += dt;
    for (let i = this.stars.length - 1; i >= 0; i--) {
      const s = this.stars[i];
      if (s.hit) {
        s.hitT += dt * 4;
        s.r += 3;
        if (s.hitT > 1) {
          this.stars.splice(i, 1);
          this._spawn(1);
        }
      } else {
        s.x += s.vx;
        s.y += s.vy;
        s.rot += s.rotV;
        if (s.x < s.r || s.x > this.W - s.r) s.vx *= -1;
        if (s.y < s.r || s.y > this.H - s.r) s.vy *= -1;
        s.pulse = 1 + Math.sin(this.t * 3 + s.phase) * 0.08;
      }
    }
  }

  draw(ctx) {
    for (const s of this.stars) {
      ctx.save();
      const a = s.hit ? Math.max(0, 1 - s.hitT) : s.pulse || 1;
      ctx.globalAlpha = a;
      ctx.translate(s.x, s.y);
      ctx.rotate(s.rot);
      ctx.scale(s.pulse || 1, s.pulse || 1);
      drawStar5(ctx, 0, 0, s.r * 0.42, s.r, s.color);
      // Musical note dots
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      ctx.font = `${s.r * 0.65}px system-ui`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('♪', 0, 0);
      ctx.restore();
    }
  }

  handleTap(x, y) {
    for (const s of this.stars) {
      if (!s.hit && Math.hypot(x - s.x, y - s.y) < s.r + 14) {
        s.hit = true;
        burst(s.x, s.y, 12, [s.color]);
        playNote(s.freq);
        return true;
      }
    }
    return false;
  }

  handleDrag() {} handleDragEnd() {} destroy() {}
}

function drawStar5(ctx, cx, cy, r1, r2, color) {
  ctx.beginPath();
  for (let i = 0; i < 10; i++) {
    const angle = (Math.PI / 5) * i - Math.PI / 2;
    const r = i % 2 === 0 ? r2 : r1;
    if (i === 0) ctx.moveTo(cx + r * Math.cos(angle), cy + r * Math.sin(angle));
    else ctx.lineTo(cx + r * Math.cos(angle), cy + r * Math.sin(angle));
  }
  ctx.closePath();
  ctx.fillStyle = color;
  ctx.shadowColor = color;
  ctx.shadowBlur = 18;
  ctx.fill();
  ctx.shadowBlur = 0;
}

// ─────────────────────────────────────────────────────────────────────────────
// 5. COLOR RAIN
// ─────────────────────────────────────────────────────────────────────────────
class ColorRain {
  constructor(w, h) { this.resize(w, h); this.t = 0; this.drops = []; this.pools = []; }

  resize(w, h) { this.W = w; this.H = h; }

  _spawn() {
    this.drops.push({
      x: 20 + Math.random() * (this.W - 40),
      y: -20,
      r: 10 + Math.random() * 16,
      vy: 3 + Math.random() * 4,
      color: RAINBOW[Math.floor(Math.random() * RAINBOW.length)],
      hit: false,
    });
  }

  update(dt) {
    this.t += dt;
    if (Math.random() < dt * 3.5) this._spawn();
    for (let i = this.drops.length - 1; i >= 0; i--) {
      const d = this.drops[i];
      if (!d.hit) { d.y += d.vy; if (d.y > this.H + 30) this.drops.splice(i, 1); }
    }
    for (const p of this.pools) { p.life -= dt * 0.08; p.r = Math.min(p.r + dt * 20, p.maxR); }
    this.pools.filter(p => p.life > 0);
  }

  draw(ctx) {
    // Pools on ground
    for (const p of this.pools) {
      if (p.life <= 0) continue;
      ctx.save();
      ctx.globalAlpha = Math.min(0.7, p.life * 0.7);
      ctx.beginPath();
      ctx.ellipse(p.x, p.y, p.r, p.r * 0.3, 0, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.fill();
      ctx.restore();
    }
    // Drops
    for (const d of this.drops) {
      ctx.save();
      ctx.beginPath();
      ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
      ctx.fillStyle = d.color;
      ctx.shadowColor = d.color;
      ctx.shadowBlur = 10;
      ctx.fill();
      ctx.restore();
    }
  }

  handleTap(x, y) {
    for (let i = this.drops.length - 1; i >= 0; i--) {
      const d = this.drops[i];
      if (!d.hit && Math.hypot(x - d.x, y - d.y) < d.r + 14) {
        d.hit = true;
        burst(d.x, d.y, 8, [d.color]);
        playSplash();
        this.pools.push({ x: d.x, y: this.H * 0.9, r: d.r, maxR: d.r * 4, color: d.color, life: 1 });
        this.drops.splice(i, 1);
        return true;
      }
    }
    return false;
  }

  handleDrag() {} handleDragEnd() {} destroy() {}
}

// ─────────────────────────────────────────────────────────────────────────────
// 6. SQUISH BOUNCE (companion interaction)
// ─────────────────────────────────────────────────────────────────────────────
class SquishBounce {
  constructor(w, h, squish) {

    this.prompt = 'Tap Squish!';
    this.t = 0;
  }
  resize(w, h) { this.W = w; this.H = h; }
  update(dt) { this.t += dt; }
  draw(ctx) {

    ctx.font = `bold ${Math.min(this.W, this.H) * 0.055}px system-ui`;

    ctx.fillText(this.prompt, this.W / 2, this.H * 0.15);
