// ─────────────────────────────────────────────────────────────────────────────
// 7. FIREFLY GARDEN
// ─────────────────────────────────────────────────────────────────────────────
class FireflyGarden {
  constructor(w, h) { this.resize(w, h); this.t = 0; this.flies = []; this._init(); }

  resize(w, h) { this.W = w; this.H = h; }

  _init() {
    const count = Math.floor((this.W * this.H) / 14000) + 12;
    this.flies = Array.from({ length: count }, (_, i) => ({
      x: 40 + Math.random() * (this.W - 80),
      y: this.H * 0.2 + Math.random() * (this.H * 0.65),
      r: 5 + Math.random() * 5,
      phase: Math.random() * Math.PI * 2,
      vx: (Math.random() - 0.5) * 0.6,
      vy: (Math.random() - 0.5) * 0.5,
      lit: false, litT: 0, ring: 0,
    }));
  }

  update(dt) {
    this.t += dt;
    for (const f of this.flies) {
      f.x += f.vx + Math.sin(this.t * 1.5 + f.phase) * 0.3;
      f.y += f.vy + Math.cos(this.t * 1.2 + f.phase) * 0.2;
      if (f.x < 20 || f.x > this.W - 20) f.vx *= -1;
      if (f.y < 50 || f.y > this.H - 50) f.vy *= -1;
      f.pulse = 0.5 + 0.5 * Math.sin(this.t * 3 + f.phase);
      if (f.lit) {
        f.litT += dt;
        f.ring += dt * 80;
        if (f.litT > 2) f.lit = false;
      }
    }
  }

  draw(ctx) {
    for (const f of this.flies) {
      ctx.save();
      const glow = f.lit ? 1 : f.pulse * 0.7;
      ctx.globalAlpha = 0.3 + glow * 0.7;
      // Glow halo
      const gr = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, f.r * (f.lit ? 6 : 3));
      gr.addColorStop(0, '#f59e0b');
      gr.addColorStop(1, 'rgba(245,158,11,0)');
      ctx.fillStyle = gr;
      ctx.beginPath();
      ctx.arc(f.x, f.y, f.r * (f.lit ? 6 : 3), 0, Math.PI * 2);
      ctx.fill();
      // Core
      ctx.globalAlpha = 1;
      ctx.beginPath();
      ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
      ctx.fillStyle = f.lit ? '#fef3c7' : '#fbbf24';
      ctx.fill();
      // Ring effect
      if (f.lit && f.ring < f.r * 8) {
        ctx.beginPath();
        ctx.arc(f.x, f.y, f.ring, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(245,158,11,${Math.max(0, 0.7 - f.ring / (f.r * 8))})`;
        ctx.lineWidth = 2;
        ctx.stroke();
      }
      ctx.restore();
    }
  }

  handleTap(x, y) {
    for (const f of this.flies) {
      if (Math.hypot(x - f.x, y - f.y) < f.r + 16) {
        f.lit = true; f.litT = 0; f.ring = 0;
        playFirefly();
        // Ring of light sparkles
        for (let i = 0; i < 8; i++) {
          const a = (Math.PI * 2 * i) / 8;
          sparkle(f.x + Math.cos(a) * 30, f.y + Math.sin(a) * 30, '#f59e0b');
        }
        return true;
      }
    }
    return false;
  }

  handleDrag() {} handleDragEnd() {} destroy() {}
}

// ─────────────────────────────────────────────────────────────────────────────
// 8. WEATHER WAND
// ─────────────────────────────────────────────────────────────────────────────
const WEATHERS = ['sunny', 'cloudy', 'rain', 'rainbow', 'night'];
const WEATHER_LABELS = ['☀️ Sunny', '☁️ Cloudy', '🌧 Rain', '🌈 Rainbow', '🌟 Night'];

class WeatherWand {
  constructor(w, h) {
    this.resize(w, h);
    this.t = 0;
    this.wI = 0;
    this.target = 0;
    this.swipeStart = null;
    this.raindrops = [];
    this.stars = [];
    this.swipeX = null;
    this._spawnNight();
  }

  resize(w, h) { this.W = w; this.H = h; }

  _spawnNight() {
    this.stars = Array.from({ length: 60 }, () => ({
      x: Math.random() * this.W,
      y: Math.random() * this.H * 0.6,
      r: 1 + Math.random() * 2,
      phase: Math.random() * Math.PI * 2,
    }));
  }

  _spawnRain() {
    while (this.raindrops.length < 40) {
      this.raindrops.push({
        x: Math.random() * this.W,
        y: Math.random() * this.H,
        vy: 5 + Math.random() * 4,
        color: RAINBOW[Math.floor(Math.random() * RAINBOW.length)],
        len: 10 + Math.random() * 15,
      });
    }
  }

  update(dt) {
    this.t += dt;
    if (this.wI === 2) { // rain
      this._spawnRain();
      for (const d of this.raindrops) {
        d.y += d.vy;
        if (d.y > this.H) d.y = -d.len;
      }
    } else {
      this.raindrops = [];
    }
  }

  draw(ctx) {
    const weather = WEATHERS[this.wI];

    // Sky gradient per weather
    const skyColors = {
      sunny:   ['#0ea5e9','#7dd3fc'],
      cloudy:  ['#6b7280','#9ca3af'],
      rain:    ['#374151','#6b7280'],
      rainbow: ['#818cf8','#c4b5fd'],
      night:   ['#0a0a1a','#1e1b4b'],
    };
    const [c1, c2] = skyColors[weather];
    const bg = ctx.createLinearGradient(0, 0, 0, this.H);
    bg.addColorStop(0, c1); bg.addColorStop(1, c2);
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, this.W, this.H);

    // Ground
    ctx.fillStyle = weather === 'night' ? '#1a0a2e' : '#22c55e';
    ctx.beginPath();
    ctx.roundRect(0, this.H * 0.78, this.W, this.H * 0.22, [30, 30, 0, 0]);
    ctx.fill();

    // Weather elements
    if (weather === 'sunny') {
      const sunPulse = 1 + Math.sin(this.t * 2) * 0.04;
      ctx.save();
      ctx.translate(this.W * 0.75, this.H * 0.22);
      ctx.scale(sunPulse, sunPulse);
      ctx.beginPath();
      ctx.arc(0, 0, 55, 0, Math.PI * 2);
      ctx.fillStyle = '#fbbf24';
      ctx.shadowColor = '#f59e0b';
      ctx.shadowBlur = 30;
      ctx.fill();
      ctx.restore();
      // Rays
      for (let i = 0; i < 8; i++) {
        const a = (Math.PI * 2 * i / 8) + this.t * 0.3;
        ctx.beginPath();
        ctx.moveTo(this.W * 0.75 + Math.cos(a) * 65, this.H * 0.22 + Math.sin(a) * 65);
        ctx.lineTo(this.W * 0.75 + Math.cos(a) * 85, this.H * 0.22 + Math.sin(a) * 85);
        ctx.strokeStyle = '#fbbf24'; ctx.lineWidth = 5; ctx.lineCap = 'round'; ctx.stroke();
      }
    }

    if (weather === 'cloudy' || weather === 'rain') {
      this._drawCloud(ctx, this.W * 0.25, this.H * 0.2, 70, '#e5e7eb');
      this._drawCloud(ctx, this.W * 0.65, this.H * 0.15, 55, '#d1d5db');
    }

    if (weather === 'rain') {
      for (const d of this.raindrops) {
        ctx.beginPath();
        ctx.moveTo(d.x, d.y);
        ctx.lineTo(d.x - 2, d.y + d.len);
        ctx.strokeStyle = d.color + 'bb';
        ctx.lineWidth = 2; ctx.stroke();
      }
    }

    if (weather === 'rainbow') {
      const arcColors = ['#f43f5e','#f97316','#f59e0b','#22c55e','#3b82f6','#a855f7'];
      for (let i = 0; i < arcColors.length; i++) {
        ctx.beginPath();
        ctx.arc(this.W / 2, this.H * 0.8, this.W * 0.35 + i * 20, Math.PI, 0);
        ctx.strokeStyle = arcColors[i] + 'cc';
        ctx.lineWidth = 16; ctx.stroke();
      }
      this._drawCloud(ctx, this.W * 0.1, this.H * 0.45, 50, '#fff');
      this._drawCloud(ctx, this.W * 0.85, this.H * 0.45, 50, '#fff');
    }

    if (weather === 'night') {
      for (const s of this.stars) {
        const a = 0.5 + 0.5 * Math.sin(this.t * 2.5 + s.phase);
        ctx.save();
        ctx.globalAlpha = a;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = '#fff';
        ctx.fill();
        ctx.restore();
      }
      // Moon
      ctx.beginPath();
      ctx.arc(this.W * 0.75, this.H * 0.2, 40, 0, Math.PI * 2);
      ctx.fillStyle = '#fef3c7';
      ctx.shadowColor = '#fbbf24'; ctx.shadowBlur = 25;
      ctx.fill();
      ctx.shadowBlur = 0;
      // Moon crater (cutout effect)
      ctx.beginPath();
      ctx.arc(this.W * 0.75 + 22, this.H * 0.2 - 12, 30, 0, Math.PI * 2);
      ctx.fillStyle = weather === 'night' ? '#1e1b4b' : '#818cf8';
      ctx.fill();
    }

    // Label
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.font = `bold ${Math.min(this.W, this.H) * 0.048}px system-ui`;
    ctx.textAlign = 'center';
    ctx.fillText(WEATHER_LABELS[this.wI], this.W / 2, this.H * 0.88);
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = `${Math.min(this.W, this.H) * 0.033}px system-ui`;
    ctx.fillText('← swipe to change weather →', this.W / 2, this.H * 0.93);
  }

  _drawCloud(ctx, x, y, r, color) {
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.arc(x + r * 0.8, y - r * 0.3, r * 0.75, 0, Math.PI * 2);
    ctx.arc(x - r * 0.7, y + r * 0.1, r * 0.6, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();
  }

  handleTap() { return false; }

  handleDrag(x, y) {
    if (this.swipeStart === null) { this.swipeStart = x; return; }
    this.swipeX = x;
  }

  handleDragEnd() {
    if (this.swipeStart !== null && this.swipeX !== null) {
      const dx = this.swipeX - this.swipeStart;
      if (Math.abs(dx) > 50) {
        this.wI = (this.wI + (dx > 0 ? 1 : -1) + WEATHERS.length) % WEATHERS.length;
        burst(this.W / 2, this.H * 0.5, 14, RAINBOW);
        playMagic();
        say(WEATHER_LABELS[this.wI].replace(/[^\w ]/g, ''));
      }
    }
    this.swipeStart = null;
    this.swipeX = null;
  }

  destroy() {}
}

// ── js/stage1/activities.js ──
/**
 * stage1/activities.js — Stage 1 "Intention" activities.
 * Each class: constructor(w,h), update(dt), draw(ctx), handleTap(x,y),
 * handleDrag(x,y,id), handleDragEnd(x,y,id), resize(w,h), destroy()
 * All return {done: true} from handleTap when an activity is fully complete.
 */

// (deduplicated top-level: RAINBOW)

// ─────────────────────────────────────────────────────────────────────────────
// A. COLOR MATCH — drag colored shapes into matching colored buckets
// ─────────────────────────────────────────────────────────────────────────────
const MATCH_COLORS = ['#f43f5e','#f59e0b','#22c55e','#3b82f6','#a855f7','#14b8a6'];

class ColorMatch {
  constructor(w, h) {
    this.W = w; this.H = h;
    this.done = false;
    this.matched = 0;
    this.drag = null; // {shapeI, ox, oy}
    this._build();
  }

  _build() {
    const W = this.W, H = this.H;
    const n = 6;
    const shapeW = Math.min(W / (n + 1), 64);
    const bucketW = Math.min(W / (n + 1), 70);

    this.shapes = MATCH_COLORS.map((c, i) => ({
      x: (i + 1) * W / (n + 1),
      y: H * 0.28 + (i % 2) * 30,
      baseX: (i + 1) * W / (n + 1),
      baseY: H * 0.28 + (i % 2) * 30,
      r: shapeW / 2,
      color: c,
      matched: false,
      wobble: 0,
      wobbleT: 0,
    }));

    this.buckets = MATCH_COLORS.map((c, i) => ({
      x: (i + 1) * W / (n + 1),
      y: H * 0.74,
      r: bucketW / 2,
      color: c,
      filled: false,
    }));
  }

  resize(w, h) { this.W = w; this.H = h; this._build(); }

  update(dt) {
    for (const s of this.shapes) {
      if (s.wobbleT > 0) {
        s.wobbleT -= dt * 3;
        s.wobble = Math.sin(s.wobbleT * 20) * 8;
      } else {
        s.wobble *= 0.8;
      }
    }
  }

  draw(ctx) {
    const W = this.W, H = this.H;
    // Title
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${Math.min(W, H) * 0.05}px system-ui`;
    ctx.textAlign = 'center';
    ctx.fillText('Match the colors! 🎨', W / 2, H * 0.1);

    // Buckets
    for (const b of this.buckets) {
      ctx.save();
      ctx.beginPath();
      ctx.roundRect(b.x - b.r, b.y - b.r * 0.4, b.r * 2, b.r * 1.6, 8);
      ctx.fillStyle = b.filled ? b.color : b.color + '44';
      ctx.strokeStyle = b.color;
      ctx.lineWidth = 3;
      ctx.fill(); ctx.stroke();
      // Bucket label
      ctx.fillStyle = b.filled ? '#fff' : b.color;
      ctx.font = `${b.r * 0.7}px system-ui`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(b.filled ? '✓' : '?', b.x, b.y + b.r * 0.3);
      ctx.textBaseline = 'alphabetic';
      ctx.restore();
    }

    // Shapes (unmatched only)
    for (const s of this.shapes) {
      if (s.matched) continue;
      ctx.save();
      ctx.translate(s.x + s.wobble, s.y);
      ctx.beginPath();
      ctx.arc(0, 0, s.r, 0, Math.PI * 2);
      ctx.fillStyle = s.color;
      ctx.shadowColor = s.color;
      ctx.shadowBlur = 14;
      ctx.fill();
      ctx.restore();
    }

    // Dragging shape follows cursor
    if (this.drag !== null) {
      const s = this.shapes[this.drag.shapeI];
      ctx.save();
      ctx.shadowColor = s.color;
      ctx.shadowBlur = 20;
      ctx.beginPath();
      ctx.arc(this.drag.x, this.drag.y, s.r * 1.1, 0, Math.PI * 2);
      ctx.fillStyle = s.color;
      ctx.fill();
      ctx.restore();
    }

    // Progress
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.font = `${Math.min(W, H) * 0.038}px system-ui`;
    ctx.textAlign = 'center';
    ctx.fillText(`${this.matched} / 6 matched`, W / 2, H * 0.92);
  }

  handleTap(x, y) { return this._startDrag(x, y, false); }

  _startDrag(x, y) {
    if (this.done) return false;
    for (let i = 0; i < this.shapes.length; i++) {
      const s = this.shapes[i];
      if (!s.matched && Math.hypot(x - s.x, y - s.y) < s.r + 16) {
        this.drag = { shapeI: i, x, y };
        playPop(1.2);
        return true;
      }
    }
    return false;
  }

  handleDrag(x, y) {
    if (this.drag !== null) { this.drag.x = x; this.drag.y = y; }
  }

  handleDragEnd(x, y) {
    if (this.drag === null) return false;
    const s = this.shapes[this.drag.shapeI];
    let matched = false;
    for (const b of this.buckets) {
      if (!b.filled && b.color === s.color && Math.hypot(x - b.x, y - b.y) < b.r + 20) {
        s.matched = true;
        b.filled = true;
        matched = true;
        this.matched++;
        burst(b.x, b.y, 12, [s.color]);
        playChime(this.matched);
        if (this.matched >= 6) {
          this.done = true;
          confetti(this.W / 2, this.H * 0.5, 50);
          playSuccess();
          say("You did it! All colors matched!");
          markActivityComplete('color_match');
          return { done: true };
        }
        break;
      }
    }
    if (!matched) {
      // Bounce back
      s.x = s.baseX;
      s.y = s.baseY;
      s.wobbleT = 1;
      playWobble();
    }
    this.drag = null;
    return false;
  }

  destroy() {}
}

// ─────────────────────────────────────────────────────────────────────────────
// B. SORT THE SHAPES — tap shape, then tap the right bin
// ─────────────────────────────────────────────────────────────────────────────
const SHAPE_TYPES = ['circle','square','triangle','star'];
const SHAPE_COLORS = ['#f43f5e','#f59e0b','#22c55e','#3b82f6','#a855f7','#14b8a6','#f97316','#ec4899'];

class SortShapes {
  constructor(w, h) {
    this.W = w; this.H = h;
    this.done = false;
    this.sorted = 0;
    this.selected = null; // index into this.shapes
    this.shapes = [];
    this.bins = [];
    this._build();
  }

  _build() {
    const W = this.W, H = this.H;
    const sz = Math.min(W, H) * 0.09;
    // 8 shapes scattered
    this.shapes = Array.from({ length: 8 }, (_, i) => ({
      type: SHAPE_TYPES[i % 4],
      color: SHAPE_COLORS[i],
      x: 60 + Math.random() * (W - 120),
      y: H * 0.15 + Math.random() * (H * 0.5),
      size: sz,
      jiggle: Math.random() * Math.PI * 2,
      sorted: false,
    }));
    // 3 bins (circle/square/triangle — star goes to star bin or any)
    const bW = Math.min((W - 40) / 4, 90);
    this.bins = SHAPE_TYPES.map((type, i) => ({
      type,
      x: (i + 0.5) * W / 4 + W * 0.0,
      y: H * 0.82,
      w: bW, h: bW * 0.8,
    }));
  }

  resize(w, h) { this.W = w; this.H = h; this._build(); }

  update(dt) {
    this.t = (this.t || 0) + dt;
    for (const s of this.shapes) s.jiggleV = Math.sin(this.t * 4 + s.jiggle) * 3;
  }

  draw(ctx) {
    const W = this.W, H = this.H;
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${Math.min(W, H) * 0.05}px system-ui`;
    ctx.textAlign = 'center';
    ctx.fillText('Sort the shapes! ⬡', W / 2, H * 0.1);

    // Bins
    for (const b of this.bins) {
      const active = this.selected !== null && this.shapes[this.selected].type === b.type;
      ctx.save();
      ctx.beginPath();
      ctx.roundRect(b.x - b.w / 2, b.y - b.h / 2, b.w, b.h, 10);
      ctx.fillStyle = active ? 'rgba(124,58,237,0.35)' : 'rgba(255,255,255,0.08)';
      ctx.strokeStyle = active ? '#7c3aed' : 'rgba(255,255,255,0.25)';
      ctx.lineWidth = 2;
      ctx.fill(); ctx.stroke();
      // Shape icon
      this._drawShape(ctx, b.x, b.y - 8, b.w * 0.3, b.type, '#fff');
      ctx.fillStyle = '#fff';
      ctx.font = `${Math.min(W, H) * 0.025}px system-ui`;
      ctx.textAlign = 'center';
      ctx.fillText(b.type, b.x, b.y + b.h / 2 - 4);
      ctx.restore();
    }

    // Shapes
    for (let i = 0; i < this.shapes.length; i++) {
      const s = this.shapes[i];
      if (s.sorted) continue;
      const jigY = s.jiggleV || 0;
      const selected = this.selected === i;
      ctx.save();
      if (selected) {
        ctx.shadowColor = s.color;
        ctx.shadowBlur = 20;
        ctx.scale(1.12, 1.12);
        ctx.translate(s.x * (1 - 1 / 1.12), (s.y + jigY) * (1 - 1 / 1.12));
      }
      this._drawShape(ctx, s.x, s.y + jigY, s.size, s.type, s.color);
      ctx.restore();
    }

    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.font = `${Math.min(W, H) * 0.035}px system-ui`;
    ctx.textAlign = 'center';
    ctx.fillText(`${this.sorted} / 8 sorted`, W / 2, H * 0.95);
  }

  _drawShape(ctx, x, y, sz, type, color) {
    ctx.fillStyle = color;
    ctx.beginPath();
    if (type === 'circle') {
      ctx.arc(x, y, sz * 0.5, 0, Math.PI * 2);
    } else if (type === 'square') {
      ctx.roundRect(x - sz * 0.45, y - sz * 0.45, sz * 0.9, sz * 0.9, sz * 0.12);
    } else if (type === 'triangle') {
      ctx.moveTo(x, y - sz * 0.5);
      ctx.lineTo(x + sz * 0.5, y + sz * 0.4);
      ctx.lineTo(x - sz * 0.5, y + sz * 0.4);
      ctx.closePath();
    } else if (type === 'star') {
      for (let i = 0; i < 10; i++) {
        const a = (Math.PI / 5) * i - Math.PI / 2;
        const r = i % 2 === 0 ? sz * 0.5 : sz * 0.22;
        if (i === 0) ctx.moveTo(x + r * Math.cos(a), y + r * Math.sin(a));
        else ctx.lineTo(x + r * Math.cos(a), y + r * Math.sin(a));
      }
      ctx.closePath();
    }
    ctx.shadowColor = color; ctx.shadowBlur = 10;
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  handleTap(x, y) {
    if (this.done) return false;
    // Check if tapping a bin (while shape selected)
    if (this.selected !== null) {
      for (const b of this.bins) {
        if (Math.abs(x - b.x) < b.w / 2 + 16 && Math.abs(y - b.y) < b.h / 2 + 16) {
          const s = this.shapes[this.selected];
          if (s.type === b.type) {
            s.sorted = true;
            this.sorted++;
            burst(b.x, b.y, 10, [s.color]);
            playChime(this.sorted);
            say(s.type + '!');
            if (this.sorted >= 8) {
              this.done = true;
              confetti(this.W / 2, this.H / 2, 50);
              playSuccess();
              say("Amazing! You sorted all the shapes!");
              markActivityComplete('sort_shapes');
              this.selected = null;
              return { done: true };
            }
            this.selected = null;
            return true;
          } else {
            // Wrong bin — gently bounce back
            this.shapes[this.selected].jiggle = this.shapes[this.selected].jiggle;
            playWobble();
            this.selected = null;
            return true;
          }
        }
      }
    }
    // Select a shape
    for (let i = 0; i < this.shapes.length; i++) {
      const s = this.shapes[i];
      if (!s.sorted && Math.hypot(x - s.x, y - s.y) < s.size * 0.6) {
        this.selected = i;
        playPop(1.1);
        say('Where does the ' + s.type + ' go?');
        return true;
      }
    }
    this.selected = null;
    return false;
  }

  handleDrag() {} handleDragEnd() {} destroy() {}
}

// ─────────────────────────────────────────────────────────────────────────────
// C. PATTERN PARADE — AB/ABB pattern completion
// ─────────────────────────────────────────────────────────────────────────────
const PARADE_ANIMALS = [
  { name:'duck',  color:'#f59e0b', emoji:'🦆' },
  { name:'bunny', color:'#f9a8d4', emoji:'🐰' },
  { name:'frog',  color:'#22c55e', emoji:'🐸' },
  { name:'bear',  color:'#92400e', emoji:'🐻' },
];

class PatternParade {
  constructor(w, h) {
    this.W = w; this.H = h;
    this.done = false;
    this.level = 0;
    this.streak = 0;
    this.choices = [];
    this.pattern = [];
    this.answer = null;
    this.feedback = null; // {correct, t}
    this._nextRound();
  }

  resize(w, h) { this.W = w; this.H = h; }

  _nextRound() {
    this.feedback = null;
    const W = this.W, H = this.H;
    // Level 0-2: AB, level 3+: ABB
    const patLen = this.level < 3 ? 2 : 3;
    const useAnimals = PARADE_ANIMALS.slice(0, patLen === 2 ? 2 : 3);
    const pattern = Array.from({ length: 3 }, (_, i) => useAnimals[i % patLen]);
    const answerAnimal = useAnimals[3 % patLen]; // what comes next
    this.pattern = pattern;
    this.answer = answerAnimal;
    // 3 choices: correct + 2 wrong
    const wrong = PARADE_ANIMALS.filter(a => a.name !== answerAnimal.name).slice(0, 2);
    this.choices = [answerAnimal, ...wrong].sort(() => Math.random() - 0.5);

    // Narrate pattern
    setTimeout(() => {
      const names = pattern.map(a => a.name).join('... ');
      say(`What comes next? ${names}... ?`);
    }, 300);
  }

  update(dt) {
    if (this.feedback) {
      this.feedback.t -= dt;
      if (this.feedback.t <= 0) {
        this.feedback = null;
        if (this.streak >= 5) {
          this.done = true;
          confetti(this.W / 2, this.H / 2, 50);
          playSuccess();
          say("Wonderful! You're a pattern expert!");
          markActivityComplete('pattern_parade');
        } else {
          this.level = Math.min(this.level + 1, 4);
          this._nextRound();
        }
      }
    }
  }

  draw(ctx) {
    const W = this.W, H = this.H;
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${Math.min(W, H) * 0.05}px system-ui`;
    ctx.textAlign = 'center';
    ctx.fillText("What comes next? 🔮", W / 2, H * 0.1);

    // Pattern row
    const cellW = Math.min(W * 0.18, 90);
    const n = this.pattern.length;
    const startX = W / 2 - (n * cellW * 1.2) / 2;
    for (let i = 0; i < n; i++) {
      const a = this.pattern[i];
      const cx = startX + i * cellW * 1.2 + cellW / 2;
      const cy = H * 0.32;
      ctx.save();
      ctx.beginPath();
      ctx.arc(cx, cy, cellW * 0.45, 0, Math.PI * 2);
      ctx.fillStyle = a.color;
      ctx.shadowColor = a.color; ctx.shadowBlur = 12;
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.font = `${cellW * 0.55}px system-ui`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(a.emoji, cx, cy);
      ctx.textBaseline = 'alphabetic';
      ctx.restore();
    }
    // Arrow + question mark
    const qx = startX + n * cellW * 1.2 + cellW / 2;
    const qy = H * 0.32;
    ctx.fillStyle = '#f59e0b';
    ctx.font = `${cellW * 0.6}px system-ui`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('→ ?', qx, qy);
    ctx.textBaseline = 'alphabetic';

    // Divider
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(W * 0.1, H * 0.5);
    ctx.lineTo(W * 0.9, H * 0.5);
    ctx.stroke();

    // "Choose:" label
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.font = `${Math.min(W, H) * 0.04}px system-ui`;
    ctx.textAlign = 'center';
    ctx.fillText('Tap the right one!', W / 2, H * 0.57);

    // Choices
    const choiceW = cellW * 1.1;
    const cStartX = W / 2 - (this.choices.length * choiceW * 1.3) / 2;
    for (let i = 0; i < this.choices.length; i++) {
      const c = this.choices[i];
      const cx = cStartX + i * choiceW * 1.3 + choiceW / 2;
      const cy = H * 0.7;
      const correct = this.feedback && this.feedback.correct && c.name === this.answer.name;
      const wrong = this.feedback && !this.feedback.correct && c.name === this.feedback.chosen;
      ctx.save();
      ctx.scale(correct ? 1.15 : 1, correct ? 1.15 : 1);
      ctx.translate(correct ? cx * (1 - 1 / 1.15) : 0, correct ? cy * (1 - 1 / 1.15) : 0);
      ctx.beginPath();
      ctx.arc(cx, cy, choiceW * 0.48, 0, Math.PI * 2);
      ctx.fillStyle = wrong ? '#f43f5e44' : c.color + (correct ? '' : '99');
      ctx.shadowColor = c.color; ctx.shadowBlur = correct ? 20 : 10;
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.font = `${choiceW * 0.58}px system-ui`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(c.emoji, cx, cy);
      ctx.textBaseline = 'alphabetic';
      if (correct) {
        ctx.fillStyle = '#22c55e';
        ctx.font = `bold ${choiceW * 0.3}px system-ui`;
        ctx.fillText('✓', cx + choiceW * 0.4, cy - choiceW * 0.4);
      }
      ctx.restore();
    }

    // Progress stars
    const starSize = 18;
    for (let i = 0; i < 5; i++) {
      ctx.fillStyle = i < this.streak ? '#f59e0b' : 'rgba(255,255,255,0.2)';
      ctx.font = `${starSize}px system-ui`;
      ctx.textAlign = 'center';
      ctx.fillText('★', W / 2 + (i - 2) * (starSize + 8), H * 0.92);
    }
  }

  handleTap(x, y) {
    if (this.done || this.feedback) return false;
    const W = this.W, H = this.H;
    const choiceW = Math.min(this.W * 0.18, 90) * 1.1;
    const cStartX = W / 2 - (this.choices.length * choiceW * 1.3) / 2;

    for (let i = 0; i < this.choices.length; i++) {
      const c = this.choices[i];
      const cx = cStartX + i * choiceW * 1.3 + choiceW / 2;
      const cy = H * 0.7;
      if (Math.hypot(x - cx, y - cy) < choiceW * 0.5 + 14) {
        const correct = c.name === this.answer.name;
        this.feedback = { correct, t: 1.2, chosen: c.name };
        if (correct) {
          this.streak++;
          burst(cx, cy, 12, [c.color]);
          playChime(this.streak);
          say(`Yes! ${c.name}!`);
        } else {
          playWobble();
          say(`Try again! Look at the pattern!`);
          this.streak = Math.max(0, this.streak - 1);
        }
        return true;
      }
    }
    return false;
  }

  handleDrag() {} handleDragEnd() {} destroy() {}
}

// ── js/main.js ──
/**
 * main.js — Squish World game engine.
 * State machine: AVATAR_CREATE → STAGE0 → STAGE1_HUB → STAGE1_ACTIVITY
 */

// ── Canvas setup ─────────────────────────────────────────────────────────────
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  if (game) game.onResize(canvas.width, canvas.height);
}
window.addEventListener('resize', resize);

// ── Input ─────────────────────────────────────────────────────────────────────
function pos(e, touch = false) {
  const src = touch ? e.changedTouches[0] : e;
  const r = canvas.getBoundingClientRect();
  return { x: src.clientX - r.left, y: src.clientY - r.top };
}

canvas.addEventListener('mousedown',  e => { resumeAudio(); game && game.onTap(pos(e), 'start'); });
canvas.addEventListener('mousemove',  e => { game && game.onDrag(pos(e)); });
canvas.addEventListener('mouseup',    e => { game && game.onTapEnd(pos(e)); });
canvas.addEventListener('touchstart', e => { e.preventDefault(); resumeAudio(); game && game.onTap(pos(e, true), 'start'); }, { passive: false });
canvas.addEventListener('touchmove',  e => { e.preventDefault(); game && game.onDrag(pos(e, true)); }, { passive: false });
canvas.addEventListener('touchend',   e => { e.preventDefault(); game && game.onTapEnd(pos(e, true)); }, { passive: false });

// ── Stage 0 activity list ─────────────────────────────────────────────────────
const STAGE0_ACTIVITIES = [
  { id:'bubbles',  label:'Bubble Pop',     emoji:'🫧', desc:'Pop the rainbow bubbles!' },
  { id:'animals',  label:'Animal Parade',  emoji:'🦆', desc:'Tap the animals!' },
  { id:'paint',    label:'Magic Paint',    emoji:'🎨', desc:'Draw sparkly trails!' },
  { id:'stars',    label:'Music Stars',    emoji:'⭐', desc:'Tap stars for music!' },
  { id:'rain',     label:'Color Rain',     emoji:'🌈', desc:'Splash the colorful drops!' },
  { id:'squish',   label:'Squish Bounce',  emoji:'💜', desc:'Tap Squish!' },
  { id:'firefly',  label:'Firefly Garden', emoji:'✨', desc:'Light up the fireflies!' },
  { id:'weather',  label:'Weather Wand',   emoji:'🌦', desc:'Swipe to change weather!' },
];

const STAGE1_ACTIVITIES = [
  { id:'colormatch', label:'Color Match',    emoji:'🎨', desc:'Match colors to buckets!', Cls: ColorMatch },
  { id:'sortshapes', label:'Sort Shapes',    emoji:'⬡',  desc:'Sort shapes by type!',    Cls: SortShapes },
  { id:'patterns',   label:'Pattern Parade', emoji:'🔮', desc:'What comes next?',        Cls: PatternParade },
];

// ── Main game object ──────────────────────────────────────────────────────────
let game = null;

class Game {
  constructor(w, h) {
    this.W = w; this.H = h;
    this.t = 0;
    this.lastTime = null;
    this.squish = new Squish(w, h);
    this.state = 'loading';  // loading | avatar | stage0 | stage0_activity | stage1_hub | stage1_activity
    this.scene = null;       // current activity/scene object
    this.activeActivityId = null;
    this.avatarConfig = null;
    this.stage0Time = 0;
    this.stage0Prompted = false;
    this.hubButtons = [];
    this.stage0Buttons = [];
    this.backBtn = null;
    this._init();
  }

  _init() {
    loadSave();
    this.avatarConfig = loadAvatar();
    if (!this.avatarConfig) {
      this._goto('avatar');
    } else {
      this._goto('stage0');
    }
    this._buildStage0Buttons();
  }

  _goto(state, extra = {}) {
    if (this.scene && this.scene.destroy) this.scene.destroy();
    this.scene = null;
    this.activeActivityId = null;
    this.state = state;

    if (state === 'avatar') {
      this.scene = new AvatarCreatorScene(canvas, cfg => {
        this.avatarConfig = cfg;
        this._goto('stage0');
      });
    } else if (state === 'stage0_activity') {
      this._startStage0Activity(extra.id);
    } else if (state === 'stage1_activity') {
      this._startStage1Activity(extra.id);
    } else if (state === 'stage0') {
      this._buildStage0Buttons();
      say("Let's play! Tap something!");
    } else if (state === 'stage1_hub') {
      this._buildHubButtons();
      say("Welcome! Which door will you choose?");
    }

    this.backBtn = (state === 'stage0_activity' || state === 'stage1_activity' || state === 'stage1_hub') ? {
      x: 46, y: 46, r: 32, label: '←',
    } : null;
  }

  _buildStage0Buttons() {
    const W = this.W, H = this.H;
    const cols = W > 500 ? 4 : 2;
    const rows = Math.ceil(STAGE0_ACTIVITIES.length / cols);
    const bw = (W - 32) / cols - 12;
    const bh = Math.min(bw, (H * 0.72 - 32) / rows - 12);
    this.stage0Buttons = STAGE0_ACTIVITIES.map((a, i) => ({
      ...a,
      x: 16 + (i % cols) * (bw + 12) + bw / 2,
      y: H * 0.16 + Math.floor(i / cols) * (bh + 12) + bh / 2,
      w: bw, h: bh,
    }));
  }

  _buildHubButtons() {
    const W = this.W, H = this.H;
    const bw = Math.min((W - 48) / 3 - 12, 160);
    this.hubButtons = STAGE1_ACTIVITIES.map((a, i) => ({
      ...a,
      x: 20 + i * (bw + 12) + bw / 2,
      y: H * 0.52,
      w: bw, h: bw * 1.1,
    }));
  }

  _startStage0Activity(id) {
    const W = this.W, H = this.H;
    this.activeActivityId = id;
    switch (id) {
      case 'bubbles':  this.scene = new BubblePop(W, H); break;
      case 'animals':  this.scene = new AnimalParade(W, H); break;
      case 'paint':    this.scene = new MagicPaint(W, H); break;
      case 'stars':    this.scene = new MusicStars(W, H); break;
      case 'rain':     this.scene = new ColorRain(W, H); break;
      case 'squish':   this.scene = new SquishBounce(W, H, this.squish); break;
      case 'firefly':  this.scene = new FireflyGarden(W, H); break;
      case 'weather':  this.scene = new WeatherWand(W, H); break;
    }
  }

  _startStage1Activity(id) {
    const W = this.W, H = this.H;
    this.activeActivityId = id;
    const def = STAGE1_ACTIVITIES.find(a => a.id === id);
    if (def) this.scene = new def.Cls(W, H);
  }

  onResize(w, h) {
    this.W = w; this.H = h;
    this.squish.resize(w, h);
    if (this.scene && this.scene.resize) this.scene.resize(w, h);
    this._buildStage0Buttons();
    this._buildHubButtons();
    if (this.backBtn) { this.backBtn.x = 46; this.backBtn.y = 46; }
  }

  onTap(p, phase) {
    const { x, y } = p;
    initAudio();

    // Back button
    if (this.backBtn && Math.hypot(x - this.backBtn.x, y - this.backBtn.y) < this.backBtn.r + 10) {
      if (this.state === 'stage0_activity') this._goto('stage0');
      else if (this.state === 'stage1_activity' || this.state === 'stage1_hub') this._goto('stage0');
      return;
    }

    // Squish companion tap (always active)
    if (this.squish.hit(x, y)) {
      this.squish.onTap();
      if (this.state === 'stage0') {
        // Hint toward Stage 1 unlock
        const s = getSave();
        if (s.time_in_stage0 > 55) {
          say("Tap 'Explore More' to try new adventures!");
        }
      }
      return;
    }

    switch (this.state) {
      case 'avatar':
        if (this.scene) this.scene.handleTap(x, y);
        break;

      case 'stage0':
        for (const btn of this.stage0Buttons) {
          if (Math.abs(x - btn.x) < btn.w / 2 + 10 && Math.abs(y - btn.y) < btn.h / 2 + 10) {
            this._goto('stage0_activity', { id: btn.id });
            return;
          }
        }
        // "Explore more" button
        if (this.stage0Prompted || getSave().time_in_stage0 >= 60) {
          const ebx = this.W / 2, eby = this.H * 0.94;
          if (Math.abs(x - ebx) < 120 && Math.abs(y - eby) < 30) {
            unlockStage1();
            this._goto('stage1_hub');
            return;
          }
        }
        break;

      case 'stage0_activity':
        if (this.scene) {
          const result = this.scene.handleTap(x, y);
          if (result && result.done) {
            this.squish.celebrate();
            setTimeout(() => this._goto('stage0'), 2000);
          }
        }
        break;

      case 'stage1_hub':
        for (const btn of this.hubButtons) {
          if (Math.abs(x - btn.x) < btn.w / 2 + 14 && Math.abs(y - btn.y) < btn.h / 2 + 14) {
            this._goto('stage1_activity', { id: btn.id });
            return;
          }
        }
        break;

      case 'stage1_activity':
        if (this.scene) {
          const result = this.scene.handleTap(x, y);
          if (result && result.done) {
            this.squish.celebrate();
            setTimeout(() => this._goto('stage1_hub'), 2500);
          }
        }
        break;
    }
  }

  onDrag(p) {
    const { x, y } = p;
    if (this.scene && this.scene.handleDrag) this.scene.handleDrag(x, y);
  }

  onTapEnd(p) {
    const { x, y } = p;
    if (this.scene && this.scene.handleDragEnd) {
      const result = this.scene.handleDragEnd(x, y);
      if (result && result.done) {
        this.squish.celebrate();
        setTimeout(() => {
          if (this.state === 'stage1_activity') this._goto('stage1_hub');
          else this._goto('stage0');
        }, 2500);
      }
    }
  }

  update(dt) {
    this.t += dt;
    this.squish.update(dt);
    if (this.scene && this.scene.update) this.scene.update(dt);
    updateParticles(dt);

    // Track stage0 time
    if (this.state === 'stage0' || this.state === 'stage0_activity') {
      this.stage0Time += dt;
      // Auto-save every 10s
      if (Math.floor(this.stage0Time) % 10 === 0 && this.stage0Time > 1) {
        addStage0Time(dt);
      }
      // Prompt after 60s
      const total = getSave().time_in_stage0 + this.stage0Time;
      if (total >= 60 && !this.stage0Prompted) {
        this.stage0Prompted = true;
        this.squish.shimmer();
        say("Want to explore more? Tap me to find out!");
      }
    }
  }

  draw() {
    const W = this.W, H = this.H;

    // Base background
    ctx.fillStyle = '#0a0a1a';
    ctx.fillRect(0, 0, W, H);

    // Ambient stars (always visible)
    if (this.state !== 'stage0_activity' || this.activeActivityId !== 'weather') {
      drawAmbientStars(ctx, W, H, this.t);
    }

    // Draw scene
    if (this.scene && this.scene.draw) this.scene.draw(ctx);

    // Stage 0 grid
    if (this.state === 'stage0') this._drawStage0(ctx);

    // Stage 1 hub
    if (this.state === 'stage1_hub') this._drawHub(ctx);

    // Particles
    drawParticles(ctx);

    // Squish (on top)
    this.squish.draw(ctx);

    // Avatar in top-left (outside avatar creator)
    if (this.avatarConfig && this.state !== 'avatar') {
      const avSize = Math.min(W, H) * 0.095;
      drawAvatar(ctx, avSize * 0.55, H - avSize * 0.65, avSize, this.avatarConfig);
    }

    // Back button
    if (this.backBtn) this._drawBack(ctx);

    // "Explore More" button
    if (this.state === 'stage0' && (this.stage0Prompted || getSave().time_in_stage0 >= 60)) {
      const pulse = 1 + Math.sin(this.t * 3) * 0.04;
      const bx = W / 2, by = H * 0.94;
      ctx.save();
      ctx.translate(bx, by);
      ctx.scale(pulse, pulse);
      ctx.beginPath();
      ctx.roundRect(-110, -24, 220, 48, 24);
      ctx.fillStyle = '#7c3aed';
      ctx.shadowColor = '#7c3aed'; ctx.shadowBlur = 20;
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font = `bold ${Math.min(W, H) * 0.038}px system-ui`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('✨ Explore More!', 0, 0);
      ctx.restore();
      ctx.textBaseline = 'alphabetic';
    }
  }

  _drawStage0(ctx) {
    const W = this.W, H = this.H;
    // Title
    const ts = Math.min(W, H) * 0.058;
    ctx.fillStyle = '#f59e0b';
    ctx.font = `bold ${ts}px system-ui`;
    ctx.textAlign = 'center';
    ctx.shadowColor = '#f59e0b'; ctx.shadowBlur = 18;
    ctx.fillText("✨ Squish World ✨", W / 2, H * 0.1);
    ctx.shadowBlur = 0;

    // Activity tiles
    for (const btn of this.stage0Buttons) {
      const hovered = false; // track mouse hover if needed
      ctx.save();
      ctx.beginPath();
      ctx.roundRect(btn.x - btn.w / 2, btn.y - btn.h / 2, btn.w, btn.h, 16);
      const g = ctx.createLinearGradient(btn.x - btn.w / 2, btn.y - btn.h / 2, btn.x + btn.w / 2, btn.y + btn.h / 2);
      g.addColorStop(0, 'rgba(124,58,237,0.25)');
      g.addColorStop(1, 'rgba(20,184,166,0.15)');
      ctx.fillStyle = g;
      ctx.strokeStyle = 'rgba(255,255,255,0.18)';
      ctx.lineWidth = 1.5;
      ctx.fill();
      ctx.stroke();
      // Emoji
      const es = Math.min(btn.w, btn.h) * 0.38;
      ctx.font = `${es}px system-ui`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(btn.emoji, btn.x, btn.y - btn.h * 0.08);
      // Label
      ctx.fillStyle = '#fff';
      ctx.font = `bold ${Math.min(btn.w, btn.h) * 0.17}px system-ui`;
      ctx.textBaseline = 'middle';
      ctx.fillText(btn.label, btn.x, btn.y + btn.h * 0.3);
      ctx.restore();
    }
    ctx.textBaseline = 'alphabetic';
  }

  _drawHub(ctx) {
    const W = this.W, H = this.H;
    // Title
    ctx.fillStyle = '#f59e0b';
    ctx.font = `bold ${Math.min(W, H) * 0.055}px system-ui`;
    ctx.textAlign = 'center';
    ctx.shadowColor = '#f59e0b'; ctx.shadowBlur = 14;
    ctx.fillText("🏠 Squish World", W / 2, H * 0.1);
    ctx.shadowBlur = 0;

    // Cozy house background element
    ctx.fillStyle = 'rgba(124,58,237,0.12)';
    ctx.beginPath();
    ctx.roundRect(W * 0.12, H * 0.15, W * 0.76, H * 0.78, 24);
    ctx.fill();

    // Ground
    ctx.fillStyle = 'rgba(34,197,94,0.2)';
    ctx.beginPath();
    ctx.roundRect(0, H * 0.68, W, H * 0.32, [20, 20, 0, 0]);
    ctx.fill();

    // Hub doors/buttons
    for (const btn of this.hubButtons) {
      ctx.save();
      // Door frame
      ctx.beginPath();
      ctx.roundRect(btn.x - btn.w / 2, btn.y - btn.h / 2, btn.w, btn.h, [20, 20, 4, 4]);
      const g = ctx.createLinearGradient(btn.x, btn.y - btn.h / 2, btn.x, btn.y + btn.h / 2);
      g.addColorStop(0, 'rgba(124,58,237,0.55)');
      g.addColorStop(1, 'rgba(20,184,166,0.35)');
      ctx.fillStyle = g;
      ctx.strokeStyle = '#7c3aed';
      ctx.lineWidth = 2.5;
      ctx.shadowColor = '#7c3aed'; ctx.shadowBlur = 16;
      ctx.fill();
      ctx.stroke();
      ctx.shadowBlur = 0;
      // Emoji
      ctx.font = `${btn.w * 0.45}px system-ui`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(btn.emoji, btn.x, btn.y - btn.h * 0.1);
      // Label
      ctx.fillStyle = '#fff';
      ctx.font = `bold ${btn.w * 0.17}px system-ui`;
      ctx.textBaseline = 'middle';
      ctx.fillText(btn.label, btn.x, btn.y + btn.h * 0.3);
      ctx.restore();
    }
    ctx.textBaseline = 'alphabetic';

    // Subtitle
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = `${Math.min(W, H) * 0.035}px system-ui`;
    ctx.textAlign = 'center';
    ctx.fillText('Choose a door to enter!', W / 2, H * 0.9);
  }

  _drawBack(ctx) {
    const b = this.backBtn;
    ctx.save();
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(124,58,237,0.75)';
    ctx.shadowColor = '#7c3aed'; ctx.shadowBlur = 12;
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${b.r}px system-ui`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(b.label, b.x, b.y);
    ctx.restore();
    ctx.textBaseline = 'alphabetic';
  }
}

// ── Ambient background stars ──────────────────────────────────────────────────
function drawAmbientStars(ctx, W, H, t) {
  for (let i = 0; i < 35; i++) {
    const sx = ((i * 137.508) % W);
    const sy = ((i * 97.3)    % (H * 0.92));
    const sr = 0.8 + (i % 3) * 0.5;
    const alpha = 0.2 + 0.25 * Math.sin(t * 1.5 + i * 0.7);
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.beginPath();
    ctx.arc(sx, sy, sr, 0, Math.PI * 2);
    ctx.fill();
  }
}

// ── Game loop ─────────────────────────────────────────────────────────────────
function loop(ts) {
  const dt = game.lastTime === null ? 0.016 : Math.min((ts - game.lastTime) / 1000, 0.05);
  game.lastTime = ts;
  game.update(dt);
  game.draw();
  requestAnimationFrame(loop);
}

// ── Boot ──────────────────────────────────────────────────────────────────────
function boot() {
  initSpeech();
  resize();
  game = new Game(canvas.width, canvas.height);
  // Hide loading splash once the game has booted
  const splash = document.getElementById('splash');
  if (splash) {
    splash.style.transition = 'opacity 0.5s';
    splash.style.opacity = '0';
    setTimeout(() => { splash.style.display = 'none'; }, 500);
  }
  requestAnimationFrame(loop);
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', boot);
} else {
  boot();
}
</script>
